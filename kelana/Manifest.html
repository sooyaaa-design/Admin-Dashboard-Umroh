<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
/* ─── KELANA DESIGN SYSTEM ─── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#4f46e5;--mid:#818cf8;--soft:#c7d2fe;
  --bg:#0f0d1a;--card:#1a1730;--card2:#211e36;
  --border:rgba(79,70,229,.18);--text:#f0efff;
  --sub:#8b87b8;--hover:#251f42;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
  line-height:1.5;
}

/* ─── TOP BAR ─── */
.topbar{
  padding:11px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.topbar-icon{font-size:18px;}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-.03em;flex:1;}
.topbar-sub{font-size:11px;color:var(--sub);}

/* ─── LAYOUT ─── */
.layout{
  flex:1;display:grid;grid-template-columns:330px 1fr;
  overflow:hidden;
}
.left{
  padding:14px 16px;border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:14px;
}
.right{display:flex;flex-direction:column;overflow:hidden;}

/* ─── SECTION TITLE ─── */
.sec-title{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--sub);margin-bottom:10px;
}

/* ─── FORM ─── */
.fg{margin-bottom:11px;}
.fg:last-child{margin-bottom:0;}
label{font-size:11px;color:var(--sub);display:block;margin-bottom:5px;}
.fi{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;
  outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.fi:focus{border-color:var(--primary);}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
select.fi option{background:#1a1730;color:#f0efff;}

/* ─── INFO CARD ─── */
.ic{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;
}
.ic-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:3px 12px;font-size:12px;
}
.ic-row .lbl{color:var(--sub);}

/* ─── STAT PILLS ─── */
.stat-pills{display:flex;gap:8px;margin-top:auto;}
.pill{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;text-align:center;
}
.pill-val{font-size:20px;font-weight:700;letter-spacing:-.04em;}
.pill-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.pv-blue{color:var(--primary);}
.pv-yellow{color:var(--yellow);}
.pv-green{color:var(--green);}

/* ─── TABS ─── */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{
  padding:9px 18px;font-size:12px;font-weight:500;
  border:none;background:none;color:var(--sub);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.tc{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;border-radius:9px;padding:0 5px;
  font-size:10px;font-weight:700;background:var(--card2);color:var(--sub);
  margin-left:5px;
}
.tab.active .tc{background:rgba(79,70,229,.2);color:var(--primary);}

/* ─── PANELS ─── */
.panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.panel.active{display:flex;}
.panel-body{flex:1;overflow-y:auto;padding:13px 15px;}

/* ─── SELECT-ALL ROW ─── */
.sa-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;margin-bottom:8px;
  background:var(--card);border-radius:8px;border:1px solid var(--border);
}
.sa-row label{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  font-size:12px;color:var(--text);margin:0;
}
.sa-txt{font-size:11px;color:var(--sub);}

/* ─── JAMAAH ROW ─── */
.jr{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:8px;margin-bottom:3px;
  border:1px solid transparent;transition:background .1s,border-color .1s;
}
.jr:hover{background:var(--hover);border-color:var(--border);}
.jr-chk{
  width:16px;height:16px;border-radius:4px;flex-shrink:0;
  accent-color:var(--primary);cursor:pointer;
}
.jr-info{flex:1;min-width:0;}
.jr-name{
  font-size:13px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.jr-meta{font-size:10px;color:var(--sub);}
.seat{
  width:58px;background:var(--card2);border:1px solid var(--border);
  border-radius:6px;padding:4px 6px;color:var(--text);font-size:12px;
  outline:none;text-align:center;transition:border-color .15s;
}
.seat:focus{border-color:var(--primary);}

/* ─── WARN ROW ─── */
.wr{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:8px;margin-bottom:5px;
  background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.14);
}
.wr-info{flex:1;min-width:0;}
.wr-name{font-size:13px;font-weight:500;}
.wr-meta{font-size:10px;color:var(--sub);}
.w-badge{
  font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 7px;border-radius:5px;flex-shrink:0;
  background:rgba(251,191,36,.14);color:var(--yellow);
}

/* ─── PREVIEW TABLE ─── */
.pt{width:100%;border-collapse:collapse;font-size:12px;}
.pt th{
  background:rgba(79,70,229,.2);color:var(--soft);
  padding:7px 10px;font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;border:1px solid var(--border);
  text-align:left;white-space:nowrap;
}
.pt td{
  padding:6px 10px;border:1px solid rgba(79,70,229,.1);
}
.pt tr:nth-child(even) td{background:rgba(79,70,229,.04);}
.pt .c{text-align:center;}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:40px 20px;}
.empty-ico{font-size:30px;margin-bottom:10px;opacity:.5;}
.empty-txt{color:var(--sub);font-size:13px;}

/* ─── BOTTOM BAR ─── */
.botbar{
  padding:11px 18px;border-top:1px solid var(--border);
  background:var(--card);display:flex;
  align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;
}
.botbar-left{display:flex;align-items:center;gap:8px;}
.botbar-right{display:flex;gap:8px;}

/* ─── BUTTONS ─── */
.btn{
  padding:8px 17px;border-radius:8px;font-size:13px;font-weight:500;
  border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;white-space:nowrap;
}
.btn:disabled{opacity:.38;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover:not(:disabled){background:#4338ca;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover:not(:disabled){background:var(--hover);}
.btn-ghost{background:transparent;color:var(--sub);}
.btn-ghost:hover{color:var(--text);background:var(--hover);}
.btn-green{
  background:rgba(52,211,153,.13);color:var(--green);
  border:1px solid rgba(52,211,153,.2);
}
.btn-green:hover:not(:disabled){background:rgba(52,211,153,.24);}

/* ─── BADGE ─── */
.badge{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px;
}
.b-ok{background:rgba(52,211,153,.14);color:var(--green);}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:18px;right:16px;
  padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;
  display:none;z-index:999;
}
.toast.ok{background:#166534;color:#dcfce7;border:1px solid #22c55e;}
.toast.err{background:#7f1d1d;color:#fee2e2;border:1px solid #f87171;}
.toast.show{display:block;animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ─── LOADING ─── */
.spin{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.sk{
  display:inline-block;background:var(--card2);border-radius:4px;
  animation:sk 1.3s ease-in-out infinite;
}
@keyframes sk{0%,100%{opacity:.45}50%{opacity:.9}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(79,70,229,.3);border-radius:4px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-icon">✈</div>
  <div>
    <h1>Generate Manifest Penerbangan</h1>
    <div class="topbar-sub">Hanya jamaah dengan status dokumen "Lengkap" yang dapat dimasukkan ke manifest</div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- ── LEFT PANEL ── -->
  <div class="left">

    <!-- Group selector -->
    <div>
      <div class="sec-title">Pilih Group</div>
      <div class="fg">
        <label>Group Keberangkatan</label>
        <select class="fi" id="sel-group" onchange="onGroup(this.value)">
          <option value="">— Pilih Group —</option>
        </select>
      </div>
      <div id="ginfo" style="display:none;" class="ic">
        <div id="ginfo-body"></div>
      </div>
    </div>

    <!-- Flight form (hidden until group selected) -->
    <div id="flight-form" style="display:none;">
      <div class="sec-title">Detail Penerbangan</div>
      <div class="fg">
        <label>Nomor Flight</label>
        <input type="text" class="fi" id="inp-flight" placeholder="GA-412 / SQ-732">
      </div>
      <div class="fg">
        <label>Tanggal Keberangkatan</label>
        <input type="date" class="fi" id="inp-tgl">
      </div>
      <div class="fi-row">
        <div class="fg" style="margin-bottom:0;">
          <label>Asal</label>
          <input type="text" class="fi" id="inp-asal" placeholder="CGK / SUB">
        </div>
        <div class="fg" style="margin-bottom:0;">
          <label>Tujuan</label>
          <input type="text" class="fi" id="inp-tujuan" placeholder="MED / JED">
        </div>
      </div>
    </div>

    <!-- Stat pills (hidden until loaded) -->
    <div id="pills" style="display:none;margin-top:auto;">
      <div class="stat-pills">
        <div class="pill">
          <div class="pill-val pv-blue" id="cnt-elig">0</div>
          <div class="pill-lbl">Eligible</div>
        </div>
        <div class="pill">
          <div class="pill-val pv-yellow" id="cnt-warn">0</div>
          <div class="pill-lbl">Blm Lengkap</div>
        </div>
        <div class="pill">
          <div class="pill-val pv-green" id="cnt-sel">0</div>
          <div class="pill-lbl">Dipilih</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">

    <!-- Empty state (no group selected) -->
    <div id="panel-init" class="panel active">
      <div class="panel-body" style="display:flex;align-items:center;justify-content:center;">
        <div class="empty">
          <div class="empty-ico">🗂</div>
          <div class="empty-txt">Pilih group untuk melihat daftar jamaah</div>
        </div>
      </div>
    </div>

    <!-- Loaded state -->
    <div id="panel-main" class="panel">
      <div class="tabs">
        <button class="tab active" id="tab-elig"     onclick="switchTab('elig')">
          ✅ Eligible <span class="tc" id="tc-elig">0</span>
        </button>
        <button class="tab"        id="tab-warn"     onclick="switchTab('warn')">
          ⚠ Blm Lengkap <span class="tc" id="tc-warn">0</span>
        </button>
        <button class="tab"        id="tab-prev" style="display:none;" onclick="switchTab('prev')">
          📋 Preview <span class="tc" id="tc-prev">0</span>
        </button>
      </div>

      <!-- Eligible tab -->
      <div id="tp-elig" class="panel active">
        <div class="panel-body">
          <div class="sa-row">
            <label>
              <input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"
                style="accent-color:var(--primary);width:14px;height:14px;">
              Pilih Semua
            </label>
            <span class="sa-txt" id="sa-txt">0 dipilih</span>
          </div>
          <div id="list-elig"></div>
        </div>
      </div>

      <!-- Incomplete tab -->
      <div id="tp-warn" class="panel">
        <div class="panel-body">
          <div id="list-warn"></div>
        </div>
      </div>

      <!-- Preview tab -->
      <div id="tp-prev" class="panel">
        <div class="panel-body" id="preview-body">
          <div class="empty">
            <div class="empty-ico">👆</div>
            <div class="empty-txt">Klik "Generate Manifest" untuk melihat preview</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- BOTTOM BAR -->
<div class="botbar">
  <div class="botbar-left">
    <button class="btn btn-ghost" onclick="google.script.host.close()">Batal</button>
    <div id="gen-status" style="display:none;"></div>
  </div>
  <div class="botbar-right">
    <button class="btn btn-green" id="btn-export" disabled onclick="doExport()">
      🖨 Export / Print
    </button>
    <button class="btn btn-primary" id="btn-gen" disabled onclick="doGenerate()">
      ✈ Generate Manifest
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── STATE ─── */
var _groups = [], _elig = [], _warn = [], _selGroup = null;

/* ─── INIT ─── */
function init() {
  google.script.run
    .withSuccessHandler(function(list) {
      _groups = list || [];
      var sel = document.getElementById('sel-group');
      _groups.forEach(function(g) {
        var o = document.createElement('option');
        o.value = g.idGroup;
        o.textContent = g.namaGroup + (g.tglBerangkat ? '  ·  ' + g.tglBerangkat : '');
        sel.appendChild(o);
      });
    })
    .withFailureHandler(function(e) { toast('Gagal memuat group: ' + e.message, 'err'); })
    .getGroupList();
}

/* ─── GROUP CHANGE ─── */
function onGroup(id) {
  _selGroup = id || null;
  var hasSel = !!id;

  el('flight-form').style.display  = hasSel ? 'block' : 'none';
  el('pills').style.display        = hasSel ? 'block' : 'none';
  el('ginfo').style.display        = 'none';
  el('btn-gen').disabled           = true;
  el('btn-export').disabled        = true;
  el('gen-status').style.display   = 'none';

  if (!hasSel) {
    setPanel('panel-init'); return;
  }

  // Show group info card
  var g = _groups.find(function(x){ return x.idGroup === id; });
  if (g) {
    el('ginfo-body').innerHTML =
      '<div class="ic-row">' +
      row('Berangkat', g.tglBerangkat || '—') +
      row('Maskapai',  g.maskapai     || '—') +
      row('Kapasitas', g.kapasitas    || '—') +
      row('Terisi',    g.terisi       || '0') +
      '</div>';
    el('ginfo').style.display = 'block';

    if (g.noFlightPergi) el('inp-flight').value = g.noFlightPergi;
    if (g.tglBerangkat) {
      try {
        var d = new Date(g.tglBerangkat);
        if (!isNaN(d)) el('inp-tgl').value = d.toISOString().split('T')[0];
      } catch(e){}
    }
  }

  // Load jamaah
  var btn = el('btn-gen');
  btn.innerHTML = '<span class="spin">⟳</span> Memuat…';
  btn.disabled  = true;

  google.script.run
    .withSuccessHandler(function(res) {
      _elig = res.eligible      || [];
      _warn = res.tidakLengkap  || [];

      renderElig();
      renderWarn();
      updateCounts();

      setPanel('panel-main');
      btn.innerHTML = '✈ Generate Manifest';
      btn.disabled  = _elig.length === 0;

      // Check if manifest already exists
      google.script.run
        .withSuccessHandler(function(rows) {
          if (rows && rows.length) {
            el('btn-export').disabled = false;
            showGenStatus('✓ Manifest tersimpan (' + rows.length + ' jamaah)');
            showPreview(rows);
          }
        })
        .getManifestByGroup(id);
    })
    .withFailureHandler(function(e) {
      btn.innerHTML = '✈ Generate Manifest';
      toast('Gagal memuat data: ' + e.message, 'err');
    })
    .getJamaahEligibleManifest(id);
}

/* ─── RENDER ELIGIBLE ─── */
function renderElig() {
  var c = el('list-elig');
  if (!_elig.length) {
    c.innerHTML = '<div class="empty"><div class="empty-ico">😔</div>' +
      '<div class="empty-txt">Belum ada jamaah dengan dokumen lengkap di group ini</div></div>';
    return;
  }
  c.innerHTML = _elig.map(function(j) {
    return '<div class="jr">' +
      '<input type="checkbox" class="jr-chk jchk" data-id="' + j.idJamaah + '" checked' +
      ' onchange="updateSel()">' +
      '<div class="jr-info">' +
        '<div class="jr-name">' + esc(j.namaJamaah) + '</div>' +
        '<div class="jr-meta">' + esc(j.idJamaah) + ' · ' + esc(j.noPaspor||'—') + ' · ' + esc(j.jenisKelamin||'—') + '</div>' +
      '</div>' +
      '<input type="text" class="seat jkursi" data-id="' + j.idJamaah + '" placeholder="Kursi">' +
    '</div>';
  }).join('');
  el('chk-all').checked = true;
  updateSel();
}

/* ─── RENDER INCOMPLETE ─── */
function renderWarn() {
  var c = el('list-warn');
  if (!_warn.length) {
    c.innerHTML = '<div class="empty"><div class="empty-ico">✅</div>' +
      '<div class="empty-txt">Semua jamaah sudah dokumen lengkap</div></div>';
    return;
  }
  c.innerHTML = _warn.map(function(j) {
    return '<div class="wr">' +
      '<div class="wr-info">' +
        '<div class="wr-name">' + esc(j.namaJamaah) + '</div>' +
        '<div class="wr-meta">' + esc(j.idJamaah) + ' · ' + esc(j.noPaspor || 'Paspor belum ada') + '</div>' +
      '</div>' +
      '<span class="w-badge">' + esc(j.statusDokumen) + '</span>' +
    '</div>';
  }).join('');
}

/* ─── TABS ─── */
function switchTab(name) {
  ['elig','warn','prev'].forEach(function(t) {
    el('tab-' + t).classList.toggle('active', t === name);
    el('tp-'  + t).classList.toggle('active', t === name);
  });
}

/* ─── SELECT ALL / COUNT ─── */
function toggleAll(v) {
  document.querySelectorAll('.jchk').forEach(function(c){ c.checked = v; });
  updateSel();
}
function updateSel() {
  var all  = document.querySelectorAll('.jchk');
  var done = document.querySelectorAll('.jchk:checked');
  el('cnt-sel').textContent  = done.length;
  el('sa-txt').textContent   = done.length + ' dipilih';
  var cka = el('chk-all');
  cka.indeterminate = done.length > 0 && done.length < all.length;
  cka.checked       = done.length === all.length && all.length > 0;
}
function updateCounts() {
  el('tc-elig').textContent  = _elig.length;
  el('tc-warn').textContent  = _warn.length;
  el('cnt-elig').textContent = _elig.length;
  el('cnt-warn').textContent = _warn.length;
  updateSel();
}

/* ─── GENERATE ─── */
function doGenerate() {
  if (!_selGroup) { toast('Pilih group terlebih dahulu', 'err'); return; }

  var noFlight = el('inp-flight').value.trim();
  var tgl      = el('inp-tgl').value;
  var asal     = el('inp-asal').value.trim().toUpperCase();
  var tujuan   = el('inp-tujuan').value.trim().toUpperCase();

  if (!noFlight) { toast('Nomor flight wajib diisi', 'err'); return; }
  if (!tgl)      { toast('Tanggal keberangkatan wajib diisi', 'err'); return; }
  if (!asal || !tujuan) { toast('Asal dan tujuan wajib diisi', 'err'); return; }

  var list = [];
  document.querySelectorAll('.jchk:checked').forEach(function(c) {
    var sid = document.querySelector('.jkursi[data-id="' + c.dataset.id + '"]');
    list.push({ idJamaah: c.dataset.id, noKursi: sid ? sid.value.trim() : '' });
  });
  if (!list.length) { toast('Pilih minimal 1 jamaah', 'err'); return; }

  var g = _groups.find(function(x){ return x.idGroup === _selGroup; });

  var btn = el('btn-gen');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Generating…';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.innerHTML = '✈ Generate Manifest';
      btn.disabled  = false;
      if (res.success) {
        toast('✅ Manifest dibuat — ' + res.count + ' jamaah', 'ok');
        el('btn-export').disabled = false;
        showGenStatus('✓ Manifest tersimpan (' + res.count + ' jamaah)');
        el('tab-prev').style.display = 'inline-flex';
        el('tc-prev').textContent    = res.count;
        google.script.run
          .withSuccessHandler(function(rows) { showPreview(rows); switchTab('prev'); })
          .getManifestByGroup(_selGroup);
      } else {
        toast('❌ ' + (res.error || 'Gagal generate manifest'), 'err');
      }
    })
    .withFailureHandler(function(e) {
      btn.innerHTML = '✈ Generate Manifest';
      btn.disabled  = false;
      toast('Error: ' + e.message, 'err');
    })
    .generateManifestSecure({
      idGroup:     _selGroup,
      namaGroup:   g ? g.namaGroup : _selGroup,
      noFlight:    noFlight,
      tglBerangkat:tgl,
      asal:        asal,
      tujuan:      tujuan,
      jamaahList:  list
    });
}

/* ─── PREVIEW ─── */
function showPreview(rows) {
  if (!rows || !rows.length) return;
  el('tc-prev').textContent    = rows.length;
  el('tab-prev').style.display = 'inline-flex';

  var thead = '<tr><th class="c">#</th><th>ID Jamaah</th><th>Nama Lengkap</th>' +
    '<th>No. Paspor</th><th>Tgl Lahir</th><th class="c">L/P</th>' +
    '<th class="c">Kursi</th><th>No. Visa</th></tr>';

  var tbody = rows.map(function(r, i) {
    return '<tr>' +
      '<td class="c">' + (i+1) + '</td>' +
      '<td>' + esc(r.idJamaah) + '</td>' +
      '<td><strong>' + esc(r.namaJamaah) + '</strong></td>' +
      '<td>' + esc(r.noPaspor) + '</td>' +
      '<td>' + esc(r.tglLahir) + '</td>' +
      '<td class="c">' + esc(r.jenisKelamin) + '</td>' +
      '<td class="c">' + (r.noKursi ? esc(r.noKursi) : '<span style="color:var(--sub)">—</span>') + '</td>' +
      '<td>'  + (r.noVisa   ? esc(r.noVisa)   : '<span style="color:var(--sub)">—</span>') + '</td>' +
    '</tr>';
  }).join('');

  el('preview-body').innerHTML =
    '<table class="pt"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table>';
}

/* ─── EXPORT ─── */
function doExport() {
  if (!_selGroup) return;
  var btn = el('btn-export');
  btn.disabled  = true;
  btn.innerHTML = '<span class="spin">⟳</span> Exporting…';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled  = false;
      btn.innerHTML = '🖨 Export / Print';
      if (res.success) {
        var w = window.open('', '_blank');
        if (w) {
          w.document.write(res.html);
          w.document.close();
        } else {
          toast('Popup diblokir — izinkan popup untuk halaman ini lalu coba lagi', 'err');
        }
      } else {
        toast('❌ ' + (res.error || 'Gagal export'), 'err');
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled  = false;
      btn.innerHTML = '🖨 Export / Print';
      toast('Error: ' + e.message, 'err');
    })
    .exportManifestHtml(_selGroup);
}

/* ─── HELPERS ─── */
function el(id) { return document.getElementById(id); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function row(lbl, val) {
  return '<div class="lbl">' + lbl + '</div><div>' + esc(val) + '</div>';
}
function setPanel(id) {
  ['panel-init','panel-main'].forEach(function(p) {
    el(p).classList.toggle('active', p === id);
  });
}
function showGenStatus(msg) {
  var s = el('gen-status');
  s.innerHTML = '<span class="badge b-ok">' + msg + '</span>';
  s.style.display = 'block';
}

var _toastT;
function toast(msg, type) {
  var t = el('toast');
  t.textContent = msg;
  t.className   = 'toast ' + type + ' show';
  clearTimeout(_toastT);
  _toastT = setTimeout(function(){ t.className = 'toast'; }, 3500);
}

init();
</script>
