}
async function loadBayarPage(){
  const st=bayarState; const wrap=$('bayarTableWrap'); if(wrap) wrap.innerHTML='<div class="spinner"></div>';
  try{
    const d=await api('pembayaran.page',{search:st.search,filterStatus:st.status,page:st.page,perPage:st.perPage});
    st.rows=d.rows||[]; st.total=d.total||0; st.pages=d.pages||1; st.page=d.page||1;
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK'&&wrap) wrap.innerHTML=emptyState('⚠️','Gagal memuat',e.message); return; }
  renderBayarTable();
}
function renderBayarTable(){
  const st=bayarState; const wrap=$('bayarTableWrap'); if(!wrap) return;
  if(!st.rows.length){ wrap.innerHTML=emptyState('🧾','Belum ada invoice','Invoice akan muncul saat ada tagihan.'); return; }
  const start=(st.page-1)*st.perPage;
  let h='<div class="tbl-wrap"><table class="tbl"><colgroup><col style="width:11%"><col style="width:16%"><col style="width:9%"><col style="width:12%"><col style="width:11%"><col style="width:11%"><col style="width:11%"><col style="width:6%"><col style="width:13%"></colgroup>'
    +'<thead><tr><th>Invoice</th><th>Jamaah</th><th>Jenis</th><th>Nominal</th><th>Status</th><th>Metode</th><th>Tgl Bayar</th><th>Bukti</th><th></th></tr></thead><tbody>';
  st.rows.forEach(p=>{
    const idJs=esc(p.idInvoice);
    let act='<button class="btn sm" title="Detail" onclick="event.stopPropagation();openBayarDetail(\''+idJs+'\')">'+icon('list',13)+'</button> '
      +'<button class="btn sm" title="Preview invoice" onclick="event.stopPropagation();openInvoicePreview(\''+idJs+'\')">'+icon('doc',13)+'</button> ';
    if(canFinance()){
      if(p.status!=='Lunas'){
        act+='<button class="btn sm primary" onclick="event.stopPropagation();openKonfirm(\''+idJs+'\',\''+esc((p.namaJamaah||'').replace(/'/g,''))+'\')">Konfirm</button> ';
        act+='<button class="btn sm" title="Kirim reminder WA" onclick="event.stopPropagation();bayarReminder(\''+idJs+'\')">'+icon('wa',14)+'</button>';
      }
    }
    const bukti=p.buktiBayar?'<a href="'+esc(p.buktiBayar)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Lihat bukti">🧾</a>':'<span class="muted">—</span>';
    h+='<tr class="clickable" onclick="openBayarDetail(\''+idJs+'\')"><td class="sm mono">'+esc(p.idInvoice)+'</td><td>'+esc(p.namaJamaah||'-')+'</td><td class="sm">'+esc(p.jenisBayar||'-')+'</td>'
      +'<td class="mono">'+rupiah(p.nominal)+'</td><td>'+badgeInvoice(p.status)+'</td>'
      +'<td class="sm">'+esc(p.metode||'-')+'</td>'
      +'<td class="sm">'+(p.tglBayar?fmtDateTime(p.tglBayar):'<span class="muted">—</span>')+'</td>'
      +'<td style="text-align:center">'+bukti+'</td>'
      +'<td style="white-space:nowrap" onclick="event.stopPropagation()">'+act+'</td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="pager"><span>Menampilkan '+(st.total?start+1:0)+'–'+Math.min(start+st.perPage,st.total)+' dari '+st.total+'</span>'
    +'<div class="pg-btns"><button class="btn sm" '+(st.page<=1?'disabled':'')+' onclick="bayarPage(-1)">‹ Sebelumnya</button>'
    +'<span style="padding:5px 8px">Hal '+st.page+'/'+st.pages+'</span>'
    +'<button class="btn sm" '+(st.page>=st.pages?'disabled':'')+' onclick="bayarPage(1)">Berikutnya ›</button></div></div>';
  wrap.innerHTML=h;
}
function bayarSearchInput(){ const st=bayarState; clearTimeout(st.searchTimer); st.searchTimer=setTimeout(function(){ st.search=$('bSearch')?$('bSearch').value:''; st.page=1; loadBayarPage(); },350); }
function bayarFilterChange(){ const st=bayarState; st.status=$('bStatus')?$('bStatus').value:''; st.page=1; loadBayarPage(); }
function bayarPage(d){ const st=bayarState; st.page=Math.min(Math.max(1,st.page+d),st.pages); loadBayarPage(); }
function statPill(lbl,val){ return '<div class="stat-pill"><div class="lbl">'+esc(lbl)+'</div><div class="val">'+esc(val)+'</div></div>'; }
function openKonfirm(idInvoice,nama){
  openModal('<div class="modal-head"><h3>Konfirmasi Pembayaran</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body"><p class="muted sm" style="margin-bottom:14px">Konfirmasi pembayaran untuk <b>'+esc(nama)+'</b> (Invoice '+esc(idInvoice)+').</p>'
    +'<div class="form-grid">'
    +field('Metode Pembayaran',true,'<select id="k_metode"><option>Transfer Bank</option><option>QRIS</option><option>Tunai</option><option>Xendit</option></select>','fg-full')
    +field('Bukti Pembayaran',false,'<input type="file" id="k_bukti" accept="image/*,application/pdf"><div id="k_buktiInfo" class="sm muted"></div>','fg-full','Foto/scan bukti transfer (maks 5MB, opsional tapi dianjurkan)')
    +field('Catatan',false,'<textarea id="k_catatan" placeholder="Opsional"></textarea>','fg-full')
    +'</div></div>'
    +'<div class="modal-foot"><button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" id="kBtn" onclick="submitKonfirm(\''+esc(idInvoice)+'\')">Konfirmasi</button></div>',{size:'sm',persistent:true});
}
async function submitKonfirm(idInvoice){
  const b=$('kBtn'); b.disabled=true; b.textContent='Memproses…';
  try{
    let buktiUrl='';
    const fi=$('k_bukti');
    if(fi&&fi.files&&fi.files[0]){
      const file=fi.files[0];
      if(file.size>5*1024*1024){ toast('Bukti terlalu besar (maks 5MB).','error'); b.disabled=false; b.textContent='Konfirmasi'; return; }
      if($('k_buktiInfo')) $('k_buktiInfo').textContent='Mengupload bukti…';
      const base64=await new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=e=>res(e.target.result.split(',')[1]); rd.onerror=rej; rd.readAsDataURL(file); });
      const up=await api('pembayaran.uploadBukti',{idInvoice,base64,mimeType:file.type,fileName:file.name});
      buktiUrl=(up&&up.url)||'';
    }
    const r=await api('pembayaran.konfirmasi',{idInvoice,metode:fval('k_metode'),catatan:fval('k_catatan'),buktiBayar:buktiUrl});
    closeModal(); toast('Pembayaran '+(r.namaJamaah||'')+' dikonfirmasi.');
    LOADERS.pembayaran($('content'));
  }catch(e){ if(b){b.disabled=false;b.textContent='Konfirmasi';} if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
async function openBayarDetail(idInvoice){
  openModal('<div class="modal-head"><h3>Detail Pembayaran</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body" id="bdBody"><div class="spinner"></div></div>'
    +'<div class="modal-foot"><button class="btn" onclick="openInvoicePreview(\''+esc(idInvoice)+'\')">'+icon('doc',14)+'Cetak Invoice</button><button class="btn primary" onclick="closeModal()">Tutup</button></div>',{size:'',persistent:true});
  try{
    const d=await api('pembayaran.detail',{idInvoice});
    const body=$('bdBody'); if(!body) return;
    if(!d||!d.invoice){ body.innerHTML=emptyState('⚠️','Tidak ditemukan',''); return; }
    const inv=d.invoice, bk=d.booking;
    function row(k,v){ return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-soft);font-size:13px"><span class="muted">'+esc(k)+'</span><span style="font-weight:600;text-align:right">'+v+'</span></div>'; }
    let h='<div class="card" style="padding:14px;margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b class="mono">'+esc(inv.idInvoice)+'</b>'+badgeInvoice(inv.status)+'</div>'
      +row('Jamaah',esc(inv.namaJamaah))
      +row('Jenis',esc(inv.jenisBayar))
      +row('Nominal',rupiah(inv.nominal))
      +row('Metode',esc(inv.metode||'-'))
      +row('Dibuat',fmtDateTime(inv.tglInvoice))
      +row('Jatuh Tempo',fmtDate(inv.tglJatuhTempo))
      +row('Dibayar',inv.tglBayar?fmtDateTime(inv.tglBayar):'<span class="muted">Belum</span>')
      +row('Dikonfirmasi oleh',esc(inv.dikonfirmasiOleh||'-'))
      +(inv.buktiBayar?row('Bukti','<a href="'+esc(inv.buktiBayar)+'" target="_blank" rel="noopener">Lihat bukti</a>'):'')
      +(inv.catatan?row('Catatan',esc(inv.catatan)):'')
      +'</div>';
    // Booking summary
    if(bk&&bk.anggota&&bk.anggota.length){
      h+='<div class="card" style="padding:14px;margin-bottom:12px"><div class="section-lbl" style="margin:0 0 8px">Pemesanan ('+bk.pax+' pax)</div>';
      bk.anggota.forEach(a=>{
        const dot=bk.idKeluarga?'<span class="fam-dot" style="background:'+famColor(bk.idKeluarga)+'"></span>':'';
        const addonStr=(a.addOns&&a.addOns.length)?' · '+a.addOns.length+' add-on':'';
        h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span>'+dot+esc(a.nama)+' <span class="muted">('+esc(a.tipeKamar)+(a.kategori&&a.kategori!=='Dewasa'?' · '+esc(a.kategori):'')+(a.relasi?' · '+esc(a.relasi):'')+addonStr+')</span></span><b>'+rupiah(a.hargaUnit)+'</b></div>';
      });
      h+='<div style="margin-top:8px;border-top:1px solid var(--border-soft);padding-top:8px">'
        +row('Total Booking',rupiah(bk.totalHarga))
        +row('Sudah Dibayar','<span style="color:#16a34a">'+rupiah(bk.totalDibayar)+'</span>')
        +row('Sisa','<span style="color:'+(bk.sisa>0?'#dc2626':'#16a34a')+'">'+rupiah(bk.sisa)+'</span>')
        +'</div>';
      // Add-on management
      h+='<div style="margin-top:10px"><button class="btn sm" onclick="openAddOnMgr(\''+esc(inv.idJamaah)+'\')">'+icon('plus',13)+'Kelola Add-on / Upgrade</button></div>';
      h+='</div>';
    }
    // Riwayat
    if(d.riwayat&&d.riwayat.length>1){
      h+='<div class="card" style="padding:14px"><div class="section-lbl" style="margin:0 0 8px">Riwayat Pembayaran Jamaah</div>';
      d.riwayat.forEach(x=>{ h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span>'+esc(x.jenisBayar)+' '+badgeInvoice(x.status)+'</span><span>'+rupiah(x.nominal)+(x.tglBayar?' · '+fmtDateTime(x.tglBayar):'')+'</span></div>'; });
      h+='</div>';
    }
    body.innerHTML=h;
  }catch(e){ const body=$('bdBody'); if(body) body.innerHTML=emptyState('⚠️','Gagal memuat',e.message); }
}
const ADDON_KATEGORI=['Kamar','Hotel','Bagasi','Maskapai','Layanan','Lainnya'];
async function openAddOnMgr(idJamaah){
  openModal('<div class="modal-head"><h3>Add-on / Upgrade</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body" id="aoBody"><div class="spinner"></div></div>'
    +'<div class="modal-foot"><button class="btn primary" onclick="closeModal()">Selesai</button></div>',{size:'',persistent:true});
  window._aoJamaah=idJamaah;
  await renderAddOnMgr();
}
async function renderAddOnMgr(){
  const idJamaah=window._aoJamaah; const body=$('aoBody'); if(!body) return;
  body.innerHTML='<div class="spinner"></div>';
  try{
    const list=await api('addon.list',{idJamaah});
    const items=Array.isArray(list)?list:[];
    let total=items.reduce((s,a)=>s+(a.harga||0),0);
    let h='<div class="hint" style="margin-bottom:10px">Item tambahan berbayar otomatis ikut tertagih di invoice pelunasan jamaah.</div>';
    if(items.length){
      h+='<div class="card" style="padding:10px;margin-bottom:12px">';
      items.forEach(a=>{
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border-soft)">'
          +'<span><b>'+esc(a.namaItem)+'</b> <span class="muted">('+esc(a.kategori)+')</span>'+(a.catatan?'<br><span class="sm muted">'+esc(a.catatan)+'</span>':'')+'</span>'
          +'<span style="white-space:nowrap"><b>'+rupiah(a.harga)+'</b> <button class="btn sm danger" onclick="deleteAddOn(\''+esc(a.idAddOn)+'\')">&times;</button></span></div>';
      });
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0 0;font-weight:800"><span>Total Add-on</span><span>'+rupiah(total)+'</span></div></div>';
    } else { h+='<div class="empty" style="padding:14px"><div class="sm muted">Belum ada add-on.</div></div>'; }
    h+='<div class="form-grid"><div class="section-lbl">Tambah Item</div>'

  list.innerHTML=matches.map(j=>'<div class="ac-item" onclick="pickPelunasan(\''+esc(j.idJamaah)+'\',\''+esc((j.namaLengkap||'').replace(/'/g,''))+'\')"><b>'+esc(j.namaLengkap)+'</b><span class="sm muted">'+esc(j.paket||'-')+' · '+badgeBayarText(j.statusPembayaran)+'</span></div>').join('');

  const p={email:fval('u_email').toLowerCase(),nama:fval('u_nama'),role:fval('u_role'),status:fval('u_status'),namaAkun:fval('u_akun')};
  const pass=fval('u_pass'); if(pass) p.password=pass;
  if(!p.email||!/.+@.+\..+/.test(p.email)){ toast('Email tidak valid.','error'); return; }
  if(!p.nama){ toast('Nama wajib diisi.','error'); return; }
  if(!editing && !pass){ toast('Password wajib untuk pengguna baru.','error'); return; }
  if(pass && pass.length<6){ toast('Password minimal 6 karakter.','error'); return; }
  const b=$('uBtn'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    await api('user.save',p);
    closeModal(); toast('Pengguna disimpan.'); LOADERS.pengguna($('content'));
  }catch(e){ if(b){b.disabled=false;b.textContent='Simpan';} if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }

  api('user.resetPassword',{email,password:np}).then(()=>toast('Password '+email+' direset.'))
    .catch(e=>{ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); });

  const hd=parseFloat($('pk_hd')?$('pk_hd').value:0)||0;
  const el=$('pk_preview'); if(!el) return;
  if(!hq){ el.innerHTML='<span class="muted sm">Isi harga Quad untuk melihat preview.</span>'; return; }
  el.innerHTML='<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--indigo-tx)">Quad</div><div style="font-size:15px;font-weight:800;color:var(--k)">'+rupiah(hq)+'</div></div>'
    +(ht?'<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#166534">Triple</div><div style="font-size:15px;font-weight:800;color:#16a34a">'+rupiah(hq+ht)+'</div></div>':'')
    +(hd?'<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#713f12">Double</div><div style="font-size:15px;font-weight:800;color:#d97706">'+rupiah(hq+hd)+'</div></div>':'');
}
async function submitPaket(id){
  const p={ namaPaket:fval('pk_nama'), harga:fval('pk_hq'), dpMinimal:fval('pk_dp'),
    tambahanTriple:fval('pk_ht'), tambahanDouble:fval('pk_hd'), durasi:fval('pk_durasi'),
    hotelMadinah:fval('pk_hmad'), hotelMakkah:fval('pk_hmak'), aktif:fval('pk_aktif')!=='0' };
  if(!p.namaPaket){ toast('Nama paket wajib diisi.','error'); return; }
  if(!parseFloat(p.harga)){ toast('Harga Quad wajib diisi.','error'); return; }
  if(id) p.idPaket=id;
  const b=$('pkBtn'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    const r=await api('paket.save',p);
    await getPaket(true);
    closeModal(); toast('Paket disimpan.'); if(r&&r.warning) toast(r.warning,'error');
    LOADERS.paket($('content'));
  }catch(e){ if(b){b.disabled=false;b.textContent=id?'Simpan':'Tambah Paket';} if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
function deletePaket(id,nama){
  openModal('<div class="modal-head"><h3>Hapus Paket</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body">Yakin ingin menghapus paket <b>'+esc(nama)+'</b>?</div>'
    +'<div class="modal-foot"><button class="btn" onclick="closeModal()">Batal</button><button class="btn danger" id="dpkBtn" onclick="confirmDeletePaket(\''+esc(id)+'\')">Hapus</button></div>',{size:'sm'});
}
async function confirmDeletePaket(id){
  const b=$('dpkBtn'); b.disabled=true; b.textContent='Menghapus…';
  try{ await api('paket.delete',{idPaket:id}); await getPaket(true); closeModal(); toast('Paket dihapus.'); LOADERS.paket($('content')); }
  catch(e){ if(b){b.disabled=false;b.textContent='Hapus';} if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

/* =================================================================
   VIEW: PETUGAS & TOUR LEADER
   ================================================================= */
LOADERS.petugas=async function(c){
  if(canOps()) setTopActions('<button class="btn primary" onclick="openPetugasForm()">'+icon('plus',15)+'Tambah Petugas</button>');
  c.innerHTML=skelTable(7,5);
  try{
    await getGroups();
    const list=unwrapList(await api('petugas.list'));
    cache.petugas=list;
    let h='<div class="card">';
    if(!list.length){ h+=emptyState('🧑‍✈️','Belum ada petugas','Klik "+ Tambah Petugas" untuk menambahkan pembimbing, tour leader, atau muthawif.'); }
    else {
      h+='<div class="tbl-wrap"><table class="tbl"><colgroup><col style="width:18%"><col style="width:14%"><col style="width:16%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:16%"></colgroup>'
        +'<thead><tr><th>Nama</th><th>Jabatan</th><th>Kloter</th><th>No HP</th><th>Paspor</th><th>Berlaku s/d</th><th></th></tr></thead><tbody>';
      list.forEach(p=>{
        const id=esc(p.idPetugas||''); const nm=esc((p.namaLengkap||'').replace(/'/g,''));
        h+='<tr><td><b>'+esc(p.namaLengkap)+'</b></td><td>'+esc(p.peran||'-')+'</td><td>'+esc(groupName(p.idGroup))+'</td>'
          +'<td class="sm">'+esc(p.noTelepon||'-')+'</td><td class="sm mono">'+esc(p.noPaspor||'-')+'</td><td class="sm">'+fmtDate(p.masaBerlakuPaspor)+'</td>'
          +'<td style="white-space:nowrap">'
          +(canOps()?'<button class="btn sm" onclick="openPetugasForm(\''+id+'\')">Edit</button> ':'')
          +(canOps()?'<button class="btn sm danger" onclick="deletePetugas(\''+id+'\',\''+nm+'\')">Hapus</button>':'')
          +'</td></tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') c.innerHTML=emptyState('⚠️','Gagal memuat petugas',e.message); }
};

function openPetugasForm(id){
  const editing=!!id;
  const p=editing?(cache.petugas||[]).find(x=>x.idPetugas===id)||{}:{};
  function v(k){ return esc(p[k]!=null?p[k]:''); }
  function opt(list,sel){ return list.map(o=>'<option'+(sel===o?' selected':'')+'>'+o+'</option>').join(''); }
  const groupOpts='<option value="">— Pilih Kloter —</option>'+(cache.groups||[]).map(g=>'<option value="'+esc(g.idGroup)+'"'+(p.idGroup===g.idGroup?' selected':'')+'>'+esc(g.namaGroup)+'</option>').join('');
  const jabatanOpts=opt(['Pembimbing Ibadah (TPIHI)','Ketua Kloter','Ketua Rombongan','Tour Leader','Muthawif','Handling Agent','Lainnya'],p.peran);
  const jkOpts='<option value="">—</option>'+opt(['Laki-laki','Perempuan'],p.jenisKelamin);
  openModal('<div class="modal-head"><h3>'+(editing?'Edit Petugas':'Tambah Petugas')+'</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body"><form id="ptForm" onsubmit="return false"><div class="form-grid">'
    +field('Nama',true,'<input id="pt_nama" value="'+v('namaLengkap')+'">')
    +field('Kloter',false,'<select id="pt_group">'+groupOpts+'</select>')
    +field('Jabatan',true,'<select id="pt_jabatan"><option value="">— Pilih —</option>'+jabatanOpts+'</select>')
    +field('NIK',false,'<input id="pt_nik" value="'+v('noKTP')+'">')
    +field('Jenis Kelamin',false,'<select id="pt_jk">'+jkOpts+'</select>')
    +field('Tgl Lahir',false,'<input type="date" id="pt_tglLahir" value="'+v('tanggalLahir')+'">')
    +field('Tempat Lahir',false,'<input id="pt_tempatLahir" value="'+v('tempatLahir')+'">')
    +field('No HP',false,'<input id="pt_hp" value="'+v('noTelepon')+'">')
    +field('Email',false,'<input type="email" id="pt_email" value="'+v('email')+'">')
    +field('Alamat',false,'<textarea id="pt_alamat">'+v('alamat')+'</textarea>','fg-full')
    +'<div class="section-lbl fg-full">Data Paspor</div>'
    +field('No Paspor',false,'<input id="pt_paspor" value="'+v('noPaspor')+'">')
    +field('Kewarganegaraan',false,'<input id="pt_wn" value="'+v('kewarganegaraan')+'" placeholder="Indonesia">')
    +field('Tgl Terbit',false,'<input type="date" id="pt_tglTerbit" value="'+v('tglTerbitPaspor')+'">')
    +field('Tgl Expired',false,'<input type="date" id="pt_tglExpired" value="'+v('masaBerlakuPaspor')+'">')
    +field('Catatan',false,'<textarea id="pt_catatan">'+v('catatan')+'</textarea>','fg-full')
    +'</div></form></div>'
    +'<div class="modal-foot"><button class="btn" onclick="closeModal()">Batal</button>'
    +'<button class="btn primary" id="ptBtn" onclick="submitPetugas('+(editing?'\''+esc(id)+'\'':'null')+')">'+(editing?'Simpan':'Tambah Petugas')+'</button></div>',
    {size:'lg',persistent:true});
}

async function submitPetugas(id){
  const p={namaLengkap:fval('pt_nama'),idGroup:fval('pt_group'),peran:fval('pt_jabatan'),
    noKTP:fval('pt_nik'),jenisKelamin:fval('pt_jk'),tanggalLahir:fval('pt_tglLahir'),tempatLahir:fval('pt_tempatLahir'),
    noTelepon:fval('pt_hp'),email:fval('pt_email'),alamat:fval('pt_alamat'),
    noPaspor:fval('pt_paspor'),kewarganegaraan:fval('pt_wn'),
    tglTerbitPaspor:fval('pt_tglTerbit'),masaBerlakuPaspor:fval('pt_tglExpired'),catatan:fval('pt_catatan')};
  if(!p.namaLengkap){ toast('Nama wajib diisi.','error'); return; }
  if(!p.peran){ toast('Jabatan wajib dipilih.','error'); return; }
  if(id) p.idPetugas=id;
  const b=$('ptBtn'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    await api('petugas.save',p);
    closeModal(); toast('Petugas disimpan.'); LOADERS.petugas($('content'));
  }catch(e){ if(b){b.disabled=false;b.textContent=id?'Simpan':'Tambah Petugas';} if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

function deletePetugas(id,nama){
  openModal('<div class="modal-head"><h3>Hapus Petugas</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body">Yakin ingin menghapus petugas <b>'+esc(nama)+'</b>?</div>'
    +'<div class="modal-foot"><button class="btn" onclick="closeModal()">Batal</button><button class="btn danger" id="dpBtn" onclick="confirmDeletePetugas(\''+esc(id)+'\')">Hapus</button></div>',{size:'sm'});
}

async function confirmDeletePetugas(id){
  const b=$('dpBtn'); b.disabled=true; b.textContent='Menghapus…';
  try{ await api('petugas.delete',{idPetugas:id}); closeModal(); toast('Petugas dihapus.'); LOADERS.petugas($('content')); }
  catch(e){ if(b){b.disabled=false;b.textContent='Hapus';} if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
