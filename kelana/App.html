<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelana — Manajemen Umroh</title>
<style>
:root{
  --k:#4F46E5; --k-deep:#312E81; --k-mid:#818CF8; --k-soft:#C7D2FE; --k-surface:#EEF2FF;
  --sidebar-bg:#1E1B4B;
  --bg:#F7F8FA; --card:#FFFFFF; --border:#E6E8EC; --border-soft:#EEF0F3;
  --text:#1A1D29; --text-sub:#6B7280;
  --green:#16A34A; --green-bg:#DCFCE7; --green-tx:#14532D;
  --amber:#D97706; --amber-bg:#FEF9C3; --amber-tx:#713F12;
  --red:#EF4444; --red-bg:#FEE2E2; --red-tx:#7F1D1D;
  --gray-bg:#F3F4F6; --gray-tx:#4B5563;
  --indigo-bg:#E0E7FF; --indigo-tx:#3730A3;
  --sidebar-w:196px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
svg{display:block}
.hidden{display:none!important}
.muted{color:var(--text-sub)}
.sm{font-size:12px}
.xs{font-size:11px}
.center{text-align:center}
.mono{font-variant-numeric:tabular-nums}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;gap:6px;border:0.5px solid var(--border);background:var(--card);color:var(--text);padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;transition:.12s;white-space:nowrap}
.btn:hover{background:#fafafa;border-color:#d8dadd}
.btn.primary{background:var(--k);border-color:var(--k);color:#fff}
.btn.primary:hover{background:#4338CA}
.btn.danger{background:var(--card);border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--gray-bg)}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn svg{width:16px;height:16px}

/* ---------- BADGES ---------- */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;line-height:1.6}
.badge.green{background:var(--green-bg);color:var(--green-tx)}
.badge.amber{background:var(--amber-bg);color:var(--amber-tx)}
.badge.red{background:var(--red-bg);color:var(--red-tx)}
.badge.gray{background:var(--gray-bg);color:var(--gray-tx)}
.badge.indigo{background:var(--indigo-bg);color:var(--indigo-tx)}

/* ---------- CARDS ---------- */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px}
.card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:12px}
.card-title svg{width:16px;height:16px;color:var(--k)}

/* ---------- LAYOUT ---------- */
#app{display:none}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;color:#fff;z-index:40}
.sb-logo{display:flex;align-items:center;gap:9px;padding:16px 16px 14px}
.sb-mark{width:30px;height:30px;border-radius:8px;background:var(--k);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-mark svg{width:18px;height:18px;color:#fff}
.sb-word{font-size:17px;font-weight:800;letter-spacing:-.3px}
.sb-nav{flex:1;overflow-y:auto;padding:4px 8px 12px}
.sb-nav::-webkit-scrollbar{width:6px}.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.sb-group{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:14px 10px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.72);font-size:13px;font-weight:500;cursor:pointer;transition:.1s;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:var(--k);color:#fff;font-weight:600}
.sb-item svg{width:17px;height:17px;flex-shrink:0;opacity:.9}
.sb-item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-count{background:rgba(255,255,255,.18);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;min-width:18px;text-align:center}
.sb-item.active .sb-count{background:rgba(255,255,255,.25)}
.sb-user{display:flex;align-items:center;gap:9px;padding:11px 12px;border-top:1px solid rgba(255,255,255,.1);margin:0 8px}
.sb-avatar{width:30px;height:30px;border-radius:8px;background:var(--k-mid);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-urole{font-size:10px;color:rgba(255,255,255,.5)}

.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;background:#fff;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;padding:12px 22px;z-index:30}
.topbar h1{font-size:17px;font-weight:700}
.topbar .spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:9px}
.lic-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;background:var(--green-bg);color:var(--green-tx);cursor:default}
.lic-pill.amber{background:var(--amber-bg);color:var(--amber-tx)}
.lic-pill.red{background:var(--red-bg);color:var(--red-tx)}
.lic-pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.content{flex:1;padding:22px;max-width:1500px;width:100%}

/* user menu */
.umenu-wrap{position:relative}
.umenu-btn{display:flex;align-items:center;gap:8px;background:none;border:0.5px solid var(--border);border-radius:9px;padding:5px 8px}
.umenu-btn .av{width:28px;height:28px;border-radius:7px;background:var(--k);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.umenu{position:absolute;right:0;top:46px;background:#fff;border:0.5px solid var(--border);border-radius:11px;box-shadow:0 8px 30px rgba(0,0,0,.12);min-width:200px;padding:6px;z-index:50}
.umenu .uhead{padding:9px 10px;border-bottom:0.5px solid var(--border-soft);margin-bottom:5px}
.umenu .uhead b{display:block;font-size:13px}
.umenu .mitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;width:100%;border:0;background:none;text-align:left}
.umenu .mitem:hover{background:var(--gray-bg)}
.umenu .mitem svg{width:16px;height:16px}

/* ---------- GRID ---------- */
.grid{display:grid;gap:14px}
.kpi-row{grid-template-columns:repeat(4,1fr)}
.two-col{grid-template-columns:1fr 1fr}
.cards-grid{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}

/* KPI */
.kpi .kpi-lbl{font-size:12px;color:var(--text-sub);display:flex;align-items:center;gap:6px;font-weight:600}
.kpi .kpi-lbl svg{width:15px;height:15px}
.kpi .kpi-val{font-size:26px;font-weight:800;margin:7px 0 3px;letter-spacing:-.5px}
.kpi .kpi-sub{font-size:12px;font-weight:600}
.kpi .kpi-sub.pos{color:var(--green)}
.kpi .kpi-sub.warn{color:var(--amber)}

/* progress */
.prog{height:7px;background:var(--gray-bg);border-radius:999px;overflow:hidden}
.prog>span{display:block;height:100%;background:var(--k);border-radius:999px}
.prog.green>span{background:var(--green)}
.prog.amber>span{background:var(--amber)}
.prog.red>span{background:var(--red)}

/* group row in dashboard */
.grp-row{padding:11px 0;border-bottom:0.5px solid var(--border-soft)}
.grp-row:last-child{border-bottom:0}
.grp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.grp-name{font-weight:600;font-size:13px}
.grp-meta{font-size:11px;color:var(--text-sub)}

/* fin summary bar */
.fin-line{margin-bottom:13px}
.fin-line .fl-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;font-weight:600}

/* ---------- TABLE ---------- */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
table.tbl th{text-align:left;background:#F8F9FB;color:var(--text-sub);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:9px 11px;border-bottom:0.5px solid var(--border)}
table.tbl td{padding:10px 11px;border-bottom:0.5px solid var(--border-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tbody tr.clickable{cursor:pointer}
table.tbl tbody tr.clickable:hover{background:#FAFBFF}
table.tbl tbody tr.sel{background:var(--k-surface)}
.cell-name{display:flex;align-items:center;gap:9px}
.av-init{width:28px;height:28px;border-radius:7px;background:var(--k-surface);color:var(--k);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* filter bar */
.filterbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.inp{padding:8px 11px;border:0.5px solid var(--border);border-radius:9px;background:#fff;font-size:13px;min-width:120px}
.inp:focus{outline:none;border-color:var(--k-mid);box-shadow:0 0 0 3px var(--k-surface)}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-sub)}
.search-wrap input{width:100%;padding-left:32px}

/* pagination */
.pager{display:flex;justify-content:space-between;align-items:center;margin-top:13px;font-size:12px;color:var(--text-sub)}
.pager .pg-btns{display:flex;gap:6px}

/* page with detail panel */
.page-split{display:flex;gap:14px;align-items:flex-start}
.page-split .main-col{flex:1;min-width:0}
.detail-panel{width:260px;flex-shrink:0}
@media(max-width:1000px){.page-split{flex-direction:column}.detail-panel{width:100%}}
.dp-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.dp-head .av-init{width:42px;height:42px;font-size:15px;border-radius:10px}
.dp-name{font-weight:700;font-size:15px}
.dp-field{padding:8px 0;border-bottom:0.5px solid var(--border-soft)}
.dp-field .k{font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.03em}
.dp-field .v{font-size:13px;font-weight:600;margin-top:2px;white-space:normal}
.dp-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.dp-actions .btn{justify-content:center}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:14px}
.tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--text-sub);border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:var(--k);border-bottom-color:var(--k)}

/* checkbox list */
.elig-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border:0.5px solid var(--border-soft);border-radius:9px;margin-bottom:7px}
.elig-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--k)}
.elig-row .seat{width:78px}
.elig-row .nm{flex:1}

/* stat pills */
.stat-pills{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:900px){.stat-pills{grid-template-columns:repeat(2,1fr)}}
.stat-pill{background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:13px 15px}
.stat-pill .lbl{font-size:12px;color:var(--text-sub);font-weight:600}
.stat-pill .val{font-size:20px;font-weight:800;margin-top:4px;letter-spacing:-.4px}

/* ---------- EMPTY / SKELETON ---------- */
.empty{text-align:center;padding:46px 20px;color:var(--text-sub)}
.empty .ic{font-size:34px;margin-bottom:8px}
.empty .t{font-weight:600;color:var(--text);margin-bottom:3px}
.skel{background:linear-gradient(90deg,#eef0f3 25%,#f6f7f9 37%,#eef0f3 63%);background-size:400% 100%;animation:sk 1.3s ease infinite;border-radius:6px;height:14px}
@keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
.spinner{width:22px;height:22px;border:2.5px solid var(--k-soft);border-top-color:var(--k);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#312E81,#4F46E5 55%,#6366F1);padding:20px;z-index:100}
.login-card{background:#fff;border-radius:18px;padding:34px 30px;width:380px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:18px}
.login-logo .sb-mark{width:38px;height:38px}.login-logo .sb-mark svg{width:23px;height:23px}
.login-logo .sb-word{font-size:24px;color:var(--text)}
.login-card h2{text-align:center;font-size:18px;margin-bottom:4px}
.login-card .sub{text-align:center;color:var(--text-sub);font-size:13px;margin-bottom:22px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text-sub)}
.login-field input{width:100%;padding:11px 13px;border:0.5px solid var(--border);border-radius:10px}
.login-field input:focus{outline:none;border-color:var(--k-mid);box-shadow:0 0 0 3px var(--k-surface)}
#login .btn.primary{width:100%;justify-content:center;padding:12px;margin-top:6px}
.login-err{background:var(--red-bg);color:var(--red-tx);padding:10px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px;font-weight:600}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,40,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:90}
.modal{background:#fff;border-radius:16px;width:640px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.modal.sm{width:430px}
.modal.lg{width:820px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border-bottom:0.5px solid var(--border)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-head .x{background:none;border:0;font-size:22px;line-height:1;color:var(--text-sub);padding:0 4px}
.modal-body{padding:18px 20px;overflow-y:auto}
.modal-foot{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:9px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.fg-full{grid-column:1/-1}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border);border-radius:9px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--k-mid);box-shadow:0 0 0 3px var(--k-surface)}
.field textarea{resize:vertical;min-height:62px}
.field .hint{font-size:11px;color:var(--text-sub);margin-top:3px}
.field.err input,.field.err select{border-color:var(--red)}
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-sub);grid-column:1/-1;margin-top:6px}

/* license blocking modal */
.lic-block .modal-body{text-align:center;padding:30px 26px}
.lic-block .ic{font-size:40px;margin-bottom:10px}

/* autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;left:0;right:0;top:100%;background:#fff;border:0.5px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:230px;overflow-y:auto;z-index:5;margin-top:4px}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px}
.ac-item:hover,.ac-item.hl{background:var(--k-surface)}
.ac-item b{display:block}

/* ---------- TOASTS ---------- */
#toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:9px;z-index:200}
.toast{background:#fff;border-left:4px solid var(--k);border-radius:10px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.16);font-size:13px;font-weight:600;min-width:230px;max-width:340px;animation:tin .25s ease;display:flex;align-items:center;gap:9px}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast.fade{animation:tout .35s ease forwards}
@keyframes tin{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes tout{to{transform:translateX(40px);opacity:0}}
.placeholder-box{text-align:center;padding:60px 24px}
.placeholder-box .big{font-size:48px;margin-bottom:14px}
.placeholder-box h2{font-size:20px;margin-bottom:8px}

/* photo upload */
.foto-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:0.5px solid var(--border-soft)}
.foto-row:last-child{border-bottom:0}
.foto-lbl{flex:1;font-size:12px;font-weight:600}
.foto-link{font-size:12px;color:var(--k);text-decoration:underline;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.foto-upload-input{display:none}
/* room card grid */
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:14px}
.room-card{background:var(--card);border:0.5px solid var(--border);border-radius:11px;padding:12px 14px}
.room-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.room-no{font-size:14px;font-weight:800;color:var(--k)}
.room-meta{font-size:11px;color:var(--text-sub);margin-bottom:8px}
.room-anggota{font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border-soft)}
.room-anggota:last-child{border-bottom:0}
/* ---------- ROOMLIST DRAG & DROP ---------- */
.room-drop{min-height:60px;transition:.15s;border-radius:8px}
.room-drop.drag-over{background:var(--k-surface);border:2px dashed var(--k)}
.room-drop.drag-warn{background:var(--red-bg);border:2px dashed var(--red)}
.jamaah-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#fff;border:0.5px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:grab;user-select:none}
.jamaah-chip.dragging{opacity:.4}
.fam-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dd-panel{display:flex;gap:14px;margin-top:14px}
.dd-left{width:33%;flex-shrink:0;min-width:200px}
.dd-right{flex:1;min-width:0}
.dd-room-card{background:var(--card);border:0.5px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:12px}
.cap-bar{height:5px;border-radius:999px;background:var(--gray-bg);margin-top:6px;overflow:hidden}
.cap-bar span{display:block;height:100%;border-radius:999px;background:var(--k);transition:.2s}
</style>
</head>
<body>

<!-- ========================= LOGIN ========================= -->
<div id="login" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="sb-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M16.5 4.5a8 8 0 1 0 3 12.5A6.5 6.5 0 1 1 16.5 4.5Z" fill="currentColor"/></svg>
      </div>
      <span class="sb-word">Kelana</span>
    </div>
    <h2>Masuk ke Kelana</h2>
    <div class="sub">Sistem Manajemen Umroh</div>
    <div id="loginErr" class="login-err hidden"></div>
    <div class="login-field">
      <label>Email / Nama Akun</label>
      <input id="loginEmail" type="text" placeholder="email@travel.com atau nama.akun" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn primary" id="loginBtn" onclick="doLogin()">Masuk</button>
  </div>
</div>

<!-- ===================== SETUP OWNER (first run) ===================== -->
<div id="setup" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="sb-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M16.5 4.5a8 8 0 1 0 3 12.5A6.5 6.5 0 1 1 16.5 4.5Z" fill="currentColor"/></svg>
      </div>
      <span class="sb-word">Kelana</span>
    </div>

<script>
/* =================================================================
   KELANA — Single Page App (Google Apps Script Web App frontend)
   ================================================================= */

/* ---------- ICONS (inline SVG) ---------- */
const IC = {
  dash:'<path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/>',
  users:'<circle cx="9" cy="8" r="3.2"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 6a3 3 0 0 1 0 6"/><path d="M19 20a5 5 0 0 0-3-4.6"/>',

  lead:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  doc:'<path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M8 13h8M8 17h6"/>',
  bed:'<path d="M2 8v12M2 14h20M22 14v6M6 11h6a4 4 0 0 1 4 3"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',

  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  wa:'<path d="M21 12a9 9 0 0 1-13 8L3 21l1-5a9 9 0 1 1 17-4z"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
  trash:'<path d="M3 6h18M8 6V4h8v2M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6"/>',
  plus:'<path d="M12 5v14M5 12h14"/>'
};
function icon(n,sz){ return '<svg viewBox="0 0 24 24" width="'+(sz||17)+'" height="'+(sz||17)+'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(IC[n]||'')+'</svg>'; }

/* ---------- STATE ---------- */
let token = localStorage.getItem('kelana_token') || '';
let currentUser = null;       // {email,nama,role}
let cache = { groups:null, paket:null, jamaah:null };
let familyIndex = {};  // idKeluarga → { pic, members:[...] }
function buildFamilyIndex(){
  familyIndex={};
  (cache.jamaah||[]).forEach(j=>{
    if(!j.idKeluarga) return;
    if(!familyIndex[j.idKeluarga]) familyIndex[j.idKeluarga]={ idKeluarga:j.idKeluarga, pic:null, members:[] };
    familyIndex[j.idKeluarga].members.push(j);
    if(j.isPIC) familyIndex[j.idKeluarga].pic=j;
  });
  return familyIndex;
}
function famSpouse(j){ // cari pasangan suami/istri dalam keluarga
  if(!j||!j.idKeluarga||!familyIndex[j.idKeluarga]) return null;
  const want = j.hubunganKeluarga==='Suami'?'Istri':(j.hubunganKeluarga==='Istri'?'Suami':null);
  if(!want) return null;
  return familyIndex[j.idKeluarga].members.find(m=>m.idJamaah!==j.idJamaah && m.hubunganKeluarga===want)||null;
}
const HUB_KELUARGA=['Kepala Keluarga','Suami','Istri','Anak','Orang Tua','Saudara','Mertua','Cucu','Lainnya'];
let view = 'overview';

/* ---------- HELPERS ---------- */
function gcall(fn){ const args=[].slice.call(arguments,1);
  return new Promise((res,rej)=>{ google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn].apply(null,args); }); }

// dispatcher wrapper: resolves with data, handles SESSION/AKSES/LISENSI
async function api(action, payload){
  let r;
  try { r = await gcall('api', token, action, payload||{}); }
  catch(e){ throw new Error((e&&e.message)||'Gagal menghubungi server.'); }
  if(!r){ throw new Error('Tidak ada respon dari server.'); }
  if(r.success) return r.data;
  if(r.error==='SESSION_EXPIRED'){ forceRelogin(); throw new Error('SESSION_EXPIRED'); }
  if(r.error==='AKSES_DITOLAK'){ toast(r.message||'Akses ditolak.', 'error'); throw new Error('AKSES_DITOLAK'); }
  if(r.error==='LISENSI'){ showLicenseBlock(r.message); throw new Error('LISENSI'); }
  throw new Error(r.error||r.message||'Terjadi kesalahan.');
}

function unwrapList(d){
  if(d && Array.isArray(d.data)) return d.data;
  if(Array.isArray(d)) return d;
  return [];
}
function esc(s){ if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const rupiahFmt = new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0});
function rupiah(n){ return rupiahFmt.format(Number(n)||0); }
function initials(name){ const p=String(name||'').trim().split(/\s+/); return ((p[0]?p[0][0]:'?')+(p[1]?p[1][0]:'')).toUpperCase(); }
function $(id){ return document.getElementById(id); }
function fmtDate(d){ if(!d) return '-'; try{ const dt=new Date(d); if(isNaN(dt)) return esc(d); return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return esc(d); } }
function fmtDateTime(d){ if(!d) return '-'; try{ const dt=new Date(d); if(isNaN(dt)) return esc(d); return dt.toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return esc(d); } }

/* ---------- RBAC ---------- */
function role(){ return currentUser ? currentUser.role : ''; }
function can(roles){ return roles.indexOf(role())>=0; }
const ACCESS = {
  overview:['Owner','Admin','Finance','Marketing','Pembimbing'],
  jamaah:['Owner','Admin','Finance','Marketing','Pembimbing'],
  kloter:['Owner','Admin','Finance','Marketing','Pembimbing'],
  paket:['Owner','Admin'],
  lead:['Owner','Admin','Marketing'],
  dokumen:['Owner','Admin'],
  roomlist:['Owner','Admin','Pembimbing'],
  manifest:['Owner','Admin','Pembimbing'],
  siskopatuh:['Owner','Admin'],
  petugas:['Owner','Admin'],
  pembayaran:['Owner','Finance'],
  laporan:['Owner','Finance'],
  pengguna:['Owner'],
  log:['Owner','Admin'],
  profile:['Owner','Admin','Finance','Marketing','Pembimbing']
};
const canAddJamaah   = ()=>can(['Owner','Admin','Marketing']);
const canEditJamaah  = ()=>can(['Owner','Admin']);
const canDeleteJamaah= ()=>can(['Owner']);
const canFinance     = ()=>can(['Owner','Finance']);
const canOps         = ()=>can(['Owner','Admin']);   // ubah manifest/roomlist (bukan Pembimbing)

/* ---------- TOASTS ---------- */
function toast(msg, type){ type=type||'success';
  const el=document.createElement('div'); el.className='toast '+type;
  const ic = type==='error' ? '⚠️' : '✓';
  el.innerHTML='<span>'+ic+'</span><span>'+esc(msg)+'</span>';
  $('toasts').appendChild(el);
  setTimeout(()=>{ el.classList.add('fade'); setTimeout(()=>el.remove(),350); },3000);
}

/* ---------- MODAL ---------- */
function openModal(html, opts){ opts=opts||{};
  const root=$('modalRoot');
  root.innerHTML='<div class="modal-bg" id="_mbg"><div class="modal '+(opts.size||'')+'">'+html+'</div></div>';
  if(!opts.persistent){ $('_mbg').addEventListener('mousedown',e=>{ if(e.target.id==='_mbg') closeModal(); }); }
}
function closeModal(){ $('modalRoot').innerHTML=''; }

/* =================================================================
   AUTH
   ================================================================= */
function doLogin(){
  const email=$('loginEmail').value.trim(), pass=$('loginPass').value;
  const errEl=$('loginErr'); errEl.classList.add('hidden');
  const btn=$('loginBtn');
  if(!email||!pass){ errEl.textContent='Email dan password wajib diisi.'; errEl.classList.remove('hidden'); return; }
  btn.disabled=true; btn.textContent='Memproses…';
  gcall('login', email, pass).then(r=>{
    btn.disabled=false; btn.textContent='Masuk';
    if(r && r.success){
      token=r.token; localStorage.setItem('kelana_token', token);
      currentUser=r.user; bootApp();
    } else {
      errEl.textContent=(r&&r.error)||'Login gagal.'; errEl.classList.remove('hidden');
    }
  }).catch(e=>{
    btn.disabled=false; btn.textContent='Masuk';
    errEl.textContent='Gagal menghubungi server: '+((e&&e.message)||e); errEl.classList.remove('hidden');
  });
}
function doLogout(){
  closeUserMenu();
  const t=token; token=''; localStorage.removeItem('kelana_token'); currentUser=null;
  gcall('logout', t).catch(()=>{});
  showLogin();
}
function forceRelogin(){
  token=''; localStorage.removeItem('kelana_token'); currentUser=null;
  showLogin();
  toast('Sesi berakhir, silakan masuk kembali.', 'error');
}
function showLogin(){ $('app').style.display='none'; $('setup').classList.add('hidden'); $('login').classList.remove('hidden'); $('loginPass').value=''; }
function showSetup(){ $('app').style.display='none'; $('login').classList.add('hidden'); $('setup').classList.remove('hidden'); }
function showAppShell(){ $('login').classList.add('hidden'); $('setup').classList.add('hidden'); $('app').style.display='block'; }

// Tampilkan layar setup Owner pertama bila sistem belum punya pengguna; selain itu login.
function showLoginOrSetup(){
  gcall('needsSetup').then(r=>{ if(r && r.needsSetup) showSetup(); else showLogin(); })
    .catch(()=>showLogin());
}
function doSetupOwner(){
  const namaTravel=$('suTravel').value.trim(), nama=$('suNama').value.trim();
  const email=$('suEmail').value.trim(), pass=$('suPass').value, pass2=$('suPass2').value;
  const errEl=$('setupErr'); errEl.classList.add('hidden');
  function fail(m){ errEl.textContent=m; errEl.classList.remove('hidden'); }
  if(!email||email.indexOf('@')<0) return fail('Masukkan email yang valid.');
  if(pass.length<6) return fail('Password minimal 6 karakter.');
  if(pass!==pass2) return fail('Konfirmasi password tidak cocok.');
  const btn=$('suBtn'); btn.disabled=true; btn.textContent='Menyiapkan…';
  gcall('setupOwnerPertama',{email,password:pass,nama,namaTravel}).then(r=>{
    btn.disabled=false; btn.textContent='Buat Akun & Masuk';
    if(r && r.success){ token=r.token; localStorage.setItem('kelana_token',token); currentUser=r.user; bootApp(); }
    else fail((r&&r.error)||'Gagal membuat akun.');
  }).catch(e=>{ btn.disabled=false; btn.textContent='Buat Akun & Masuk'; fail('Gagal menghubungi server: '+((e&&e.message)||e)); });
}

/* ---------- USER MENU ---------- */
function toggleUserMenu(e){ e.stopPropagation(); $('userMenu').classList.toggle('hidden'); }
function closeUserMenu(){ $('userMenu').classList.add('hidden'); }
document.addEventListener('click',()=>closeUserMenu());

/* =================================================================
   BOOT
   ================================================================= */
function bootApp(){
  showAppShell();
  $('sbAvatar').textContent=initials(currentUser.nama);
  $('sbUname').textContent=currentUser.nama;
  $('sbUrole').textContent=currentUser.role;
  $('topAv').textContent=initials(currentUser.nama);
  $('umName').textContent=currentUser.nama;
  $('umEmail').textContent=currentUser.email;
  buildSidebar();
  loadLicensePill();
  navigate('overview');
}

window.addEventListener('load',()=>{
  if(!token){ showLoginOrSetup(); return; }
  gcall('validateSession', token).then(r=>{
    if(r && r.success){ currentUser=r.user; bootApp(); }
    else { token=''; localStorage.removeItem('kelana_token'); showLoginOrSetup(); }
  }).catch(()=>{ showLoginOrSetup(); });
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && !$('login').classList.contains('hidden')) doLogin();
  else if(e.key==='Enter' && !$('setup').classList.contains('hidden')) doSetupOwner();
  if(e.key==='Escape' && $('modalRoot').innerHTML) closeModal();
});

/* =================================================================
   SIDEBAR
   ================================================================= */
const NAV = [
  {grp:'Utama', items:[
    {id:'overview', label:'Dashboard', ic:'dash'},
    {id:'jamaah',   label:'Jamaah',    ic:'users', count:()=> cache.jamaah?cache.jamaah.length:null},
    {id:'kloter',   label:'Kloter',    ic:'plane', count:()=> cache.groups?cache.groups.length:null},
    {id:'paket',    label:'Paket',     ic:'doc', count:()=> cache.paket?cache.paket.length:null},
    {id:'lead',     label:'Lead & CRM',ic:'lead'}
  ]},
  {grp:'Admin', items:[
    {id:'dokumen',  label:'Dokumen',   ic:'doc'},
    {id:'roomlist', label:'Roomlist',  ic:'bed'},
    {id:'manifest', label:'Manifest',  ic:'list'},
    {id:'siskopatuh', label:'SISKOPATUH', ic:'doc'},
    {id:'petugas', label:'Petugas', ic:'users'}
  ]},
  {grp:'Keuangan', items:[
    {id:'pembayaran', label:'Pembayaran', ic:'invoice'},
    {id:'laporan',    label:'Laporan',    ic:'chart'}
  ]},
  {grp:'Sistem', items:[
    {id:'pengguna', label:'Kelola Pengguna', ic:'shield'},
    {id:'log',      label:'Log Aktivitas',   ic:'log'}
  ]}
];
function buildSidebar(){
  let h='';
  NAV.forEach(g=>{
    const visible=g.items.filter(it=>can(ACCESS[it.id]||[]));
    if(!visible.length) return;
    h+='<div class="sb-group">'+esc(g.grp)+'</div>';
    visible.forEach(it=>{
      h+='<div class="sb-item" data-view="'+it.id+'" onclick="navigate(\''+it.id+'\')">'
        + icon(it.ic) + '<span class="lbl">'+esc(it.label)+'</span>'
        + '<span class="sb-count hidden" data-count="'+it.id+'"></span></div>';
    });
  });
  $('sbNav').innerHTML=h;
}
function updateSidebarCounts(){
  NAV.forEach(g=>g.items.forEach(it=>{
    if(!it.count) return;
    const el=document.querySelector('.sb-count[data-count="'+it.id+'"]');
    if(!el) return;
    const v=it.count();
    if(v===null||v===undefined){ el.classList.add('hidden'); }
    else { el.textContent=v; el.classList.remove('hidden'); }
  }));
}

/* =================================================================
   ROUTER
   ================================================================= */
const TITLES={overview:'Dashboard',jamaah:'Jamaah',kloter:'Kloter',lead:'Lead & CRM',dokumen:'Status Dokumen',roomlist:'Roomlist',manifest:'Manifest Keberangkatan',siskopatuh:'SISKOPATUH',petugas:'Petugas & Tour Leader',pembayaran:'Pembayaran & Invoice',laporan:'Laporan Keuangan',pengguna:'Kelola Pengguna',log:'Log Aktivitas',profile:'Profil Saya'};
function navigate(v){
  if(ACCESS[v] && !can(ACCESS[v])){ toast('Anda tidak punya akses ke halaman ini.','error'); return; }
  view=v;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active', el.dataset.view===v));
  $('pageTitle').textContent=TITLES[v]||'Kelana';
  $('topActions').innerHTML='';
  closeUserMenu();
  const c=$('content');
  c.innerHTML='<div class="spinner"></div>';
  const loader=LOADERS[v];
  if(loader) loader(c); else c.innerHTML='<div class="empty">Halaman tidak ditemukan.</div>';
}
function setTopActions(html){ $('topActions').innerHTML=html; }
function emptyState(ic,title,sub){ return '<div class="empty"><div class="ic">'+ic+'</div><div class="t">'+esc(title)+'</div><div class="sm">'+esc(sub||'')+'</div></div>'; }
function skelTable(rows,cols){ let h='<div class="card"><div class="tbl-wrap"><table class="tbl"><tbody>';
  for(let i=0;i<(rows||5);i++){ h+='<tr>'; for(let j=0;j<(cols||5);j++){ h+='<td><div class="skel" style="width:'+(50+Math.random()*40)+'%"></div></td>'; } h+='</tr>'; }
  return h+'</tbody></table></div></div>'; }

/* ---------- shared data loaders (cached) ---------- */
async function getGroups(force){ if(cache.groups&&!force) return cache.groups; cache.groups=await api('group.list'); updateSidebarCounts(); return cache.groups; }
async function getPaket(force){ if(cache.paket&&!force) return cache.paket; cache.paket=await api('paket.list'); return cache.paket; }
async function getJamaah(force){ if(cache.jamaah&&!force) return cache.jamaah; cache.jamaah=await api('jamaah.list'); updateSidebarCounts(); return cache.jamaah; }
function groupName(id){ const g=(cache.groups||[]).find(x=>x.idGroup===id); return g?g.namaGroup:(id||'-'); }

/* ---------- badge helpers ---------- */
function badgeDok(s){ const m={'Lengkap':'green','Proses':'amber','Belum Lengkap':'red'}; return '<span class="badge '+(m[s]||'gray')+'">'+esc(s||'Belum')+'</span>'; }
function badgeBayar(s){ const m={'Lunas':'green','DP Lunas':'amber','Pending':'amber','Belum Bayar':'red'}; return '<span class="badge '+(m[s]||'gray')+'">'+esc(s||'-')+'</span>'; }
function badgeInvoice(s){ const m={'Lunas':'green','Pending':'amber','Jatuh Tempo':'red','DP':'amber'}; return '<span class="badge '+(m[s]||'gray')+'">'+esc(s||'-')+'</span>'; }
function badgeLead(s){ const m={'Baru':'indigo','Follow Up':'amber','Booking':'green','Tidak Jadi':'gray'}; return '<span class="badge '+(m[s]||'gray')+'">'+esc(s||'-')+'</span>'; }
function badgeRole(r){ const m={'Owner':'red','Admin':'indigo','Finance':'green','Marketing':'amber'}; return '<span class="badge '+(m[r]||'gray')+'">'+esc(r||'-')+'</span>'; }
function badgeStatus(s){ const m={'Aktif':'green','Lengkap':'green','Lunas':'green','Berjalan':'indigo','Selesai':'gray','Draft':'amber','Fullseat':'amber','Penuh':'amber'}; return '<span class="badge '+(m[s]||'gray')+'">'+esc(s||'-')+'</span>'; }

/* =================================================================
   LICENSE
   ================================================================= */
async function loadLicensePill(){
  try{
    const l=await api('license.info');
    cache.license=l;
    const pill=$('licPill'), txt=$('licText');
    pill.classList.remove('amber','red');
    let label=(l.plan||'Lisensi');
    if(l.daysLeft!==undefined && l.daysLeft!==null) label+=' · '+l.daysLeft+' hari';
    txt.textContent=label;
    if(l.graceMode || l.valid===false){ pill.classList.add('red'); }
    else if(l.warning){ pill.classList.add('amber'); }
  }catch(e){ $('licText').textContent='Lisensi'; }
}
function showLicenseDetail(){
  const l=cache.license||{};
  openModal('<div class="modal-head"><h3>Status Lisensi</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body">'
    +'<div class="dp-field"><div class="k">Travel</div><div class="v">'+esc(l.namaTravel||'-')+'</div></div>'
    +'<div class="dp-field"><div class="k">Paket</div><div class="v">'+esc(l.plan||'-')+'</div></div>'
    +'<div class="dp-field"><div class="k">Status</div><div class="v">'+(l.valid?'<span class="badge green">Aktif</span>':'<span class="badge red">Tidak Aktif</span>')+(l.graceMode?' <span class="badge red">Grace Mode</span>':'')+'</div></div>'

async function loadJamaahPage(){
  const st=jamaahState;
  const wrap=$('jTableWrap'); if(wrap) wrap.innerHTML='<div class="spinner"></div>';
  try{
    const d=await api('jamaah.page',{search:st.search,idGroup:st.kloter,statusDokumen:st.dok,statusPembayaran:st.bayar,page:st.page,perPage:st.perPage});
    st.rows=d.rows||[]; st.total=d.total||0; st.pages=d.pages||1; st.page=d.page||1;
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK'&&wrap) wrap.innerHTML=emptyState('⚠️','Gagal memuat',e.message); return; }
  renderJamaahTable();
}
function renderJamaahTable(){
  const st=jamaahState; const wrap=$('jTableWrap'); if(!wrap) return;
  if(!st.rows.length){ wrap.innerHTML=emptyState('🔍','Tidak ada jamaah','Coba ubah filter atau tambahkan jamaah baru.'); return; }
  const start=(st.page-1)*st.perPage;
  let h='<div class="tbl-wrap"><table class="tbl"><colgroup><col style="width:24%"><col style="width:16%"><col style="width:16%"><col style="width:13%"><col style="width:13%"><col style="width:13%"></colgroup>'
    +'<thead><tr><th>Nama</th><th>Kloter</th><th>Paket</th><th>Dokumen</th><th>Pembayaran</th><th>Tgl Daftar</th></tr></thead><tbody>';
  st.rows.forEach(j=>{
    const fam=j.idKeluarga&&familyIndex[j.idKeluarga];
    const dot=j.idKeluarga?'<span class="fam-dot" style="background:'+famColor(j.idKeluarga)+'" title="Keluarga '+esc(fam&&fam.pic?fam.pic.namaLengkap:j.idKeluarga)+(fam?' · '+fam.members.length+' anggota':'')+'"></span>':'';
    const pic=j.isPIC?' <span class="badge indigo" style="font-size:9px;padding:1px 5px">PIC</span>':'';
    h+='<tr class="clickable'+(st.selected===j.idJamaah?' sel':'')+'" onclick="selectJamaah(\''+esc(j.idJamaah)+'\')">'
      +'<td><div class="cell-name"><span class="av-init">'+esc(initials(j.namaLengkap))+'</span><span style="overflow:hidden;text-overflow:ellipsis">'+dot+esc(j.namaLengkap)+pic+'</span></div></td>'
      +'<td>'+esc(groupName(j.idGroup))+'</td><td>'+esc(j.paket||'-')+'</td>'
      +'<td>'+badgeDok(j.statusDokumen)+'</td><td>'+badgeBayar(j.statusPembayaran)+'</td><td class="sm">'+fmtDate(j.tglDaftar)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="pager"><span>Menampilkan '+(st.total?start+1:0)+'–'+Math.min(start+st.perPage,st.total)+' dari '+st.total+'</span>'
    +'<div class="pg-btns"><button class="btn sm" '+(st.page<=1?'disabled':'')+' onclick="jamaahPage(-1)">‹ Sebelumnya</button>'
    +'<span style="padding:5px 8px">Hal '+st.page+'/'+st.pages+'</span>'
    +'<button class="btn sm" '+(st.page>=st.pages?'disabled':'')+' onclick="jamaahPage(1)">Berikutnya ›</button></div></div>';
  wrap.innerHTML=h;
}
function jamaahSearchInput(){
  const st=jamaahState; clearTimeout(st.searchTimer);
  st.searchTimer=setTimeout(function(){ st.search=$('jSearch')?$('jSearch').value:''; st.page=1; loadJamaahPage(); },350);
}
function jamaahFilterChange(){
  const st=jamaahState;

function jamaahPage(d){ const st=jamaahState; st.page=Math.min(Math.max(1,st.page+d),st.pages); loadJamaahPage(); }

function renderJamaahDetail(){

  if(!j) return '<div class="card"><div class="empty"><div class="sm">Data tidak ditemukan.</div></div></div>';
  function f(k,v){ return '<div class="dp-field"><div class="k">'+esc(k)+'</div><div class="v">'+(v||'-')+'</div></div>'; }
  let h='<div class="card"><div class="dp-head"><span class="av-init">'+esc(initials(j.namaLengkap))+'</span><div><div class="dp-name">'+esc(j.namaLengkap)+'</div><div class="sm muted">'+esc(j.paket||'-')+'</div></div></div>';
  h+=f('NIK', esc(j.nik));
  h+=f('No Paspor', esc(j.noPaspor));
  h+=f('No HP', esc(j.noHp));
  h+=f('Email', esc(j.email));
  h+=f('Kloter', esc(groupName(j.idGroup)));

  h+=f('Status Pembayaran', badgeBayar(j.statusPembayaran));
  if(j.kontakDarurat) h+=f('Kontak Darurat', esc(j.kontakDarurat)+' ('+esc(j.hubunganDarurat||'-')+')');
  if(j.kondisiKesehatan) h+=f('Kesehatan', esc(j.kondisiKesehatan));
  if(j.tempatLahir) h+=f('Tempat Lahir', esc(j.tempatLahir));
  if(j.pekerjaan) h+=f('Pekerjaan', esc(j.pekerjaan));
  if(j.kabupaten||j.provinsi) h+=f('Domisili', esc([j.kabupaten,j.provinsi].filter(Boolean).join(', ')));
  if(j.namaMahram) h+=f('Mahram', esc(j.namaMahram)+' ('+esc(j.hubunganMahram||'-')+')');
  // Blok Keluarga
  const fam=j.idKeluarga&&familyIndex[j.idKeluarga];
  if(fam){
    let famH='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span class="fam-dot" style="background:'+famColor(j.idKeluarga)+'"></span><b>'+fam.members.length+' anggota</b></div>';
    fam.members.forEach(m=>{
      const isMe=m.idJamaah===j.idJamaah;
      famH+='<div style="font-size:12px;padding:1px 0">'+(m.isPIC?'⭐ ':'• ')+esc(m.namaLengkap)
        +(m.hubunganKeluarga?' <span class="muted">('+esc(m.hubunganKeluarga)+')</span>':'')
        +(isMe?' <span class="muted">— ini</span>':'')+'</div>';
    });
    if(fam.pic&&fam.pic.idJamaah!==j.idJamaah){
      const picWa=String(fam.pic.noHp||'').replace(/[^0-9]/g,'').replace(/^0/,'62');
      famH+='<div style="margin-top:5px;font-size:12px">PIC: <b>'+esc(fam.pic.namaLengkap)+'</b>'+(picWa?' · <a href="https://wa.me/'+esc(picWa)+'" target="_blank" rel="noopener">WA</a>':'')+'</div>';
    }
    h+=f('Keluarga / Rombongan', famH);
    const sp=famSpouse(j);
    if(sp) h+=f('Pasangan', esc(sp.namaLengkap)+' ('+esc(sp.hubunganKeluarga)+')');
  } else if(j.hubunganKeluarga){
    h+=f('Hubungan Keluarga', esc(j.hubunganKeluarga)+(j.hubunganKeluargaDerived?' <span class="muted">(perkiraan)</span>':''));

  if(canDeleteJamaah()) h+='<button class="btn danger" onclick="jamaahDelete(\''+esc(j.idJamaah)+'\')">'+icon('trash',15)+'Hapus</button>';
  h+='</div></div>';
  return h;
}
async function jamaahReminder(id){
  try{
    const list=await api('pembayaran.list',{filterStatus:''});
    const inv=unwrapList(list).find(p=>p.idJamaah===id && p.status!=='Lunas');
    if(!inv){ toast('Tidak ada tagihan tertunggak untuk jamaah ini.','error'); return; }
    const r=await api('pembayaran.reminderText',{idInvoice:inv.idInvoice});
    openWaPreview(r.text||'',async function(msg){
      const res=await api('pembayaran.reminder',{idInvoice:inv.idInvoice,customMsg:msg});
      toast('Reminder WA dikirim ke '+(res.noHp||'jamaah')+'.');
    });
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
function jamaahDelete(id){
  const j=(cache.jamaah||[]).find(x=>x.idJamaah===id);
  openModal('<div class="modal-head"><h3>Hapus Jamaah</h3><button class="x" onclick="closeModal()">&times;</button></div>'
    +'<div class="modal-body">Yakin ingin menghapus <b>'+esc(j?j.namaLengkap:'jamaah ini')+'</b>? Tindakan ini tidak dapat dibatalkan.</div>'
    +'<div class="modal-foot"><button class="btn" onclick="closeModal()">Batal</button><button class="btn danger" id="delBtn" onclick="confirmDeleteJamaah(\''+esc(id)+'\')">Hapus</button></div>',{size:'sm'});
}
async function confirmDeleteJamaah(id){
  const b=$('delBtn'); b.disabled=true; b.textContent='Menghapus…';
  try{
    const r=await api('jamaah.delete',{idJamaah:id});
    closeModal(); toast('Jamaah '+(r.nama||'')+' dihapus.');
    jamaahState.selected=null; cache.jamaah=null;
    if($('jTableWrap')) await loadJamaahPage();
  }catch(e){ if(b){b.disabled=false;b.textContent='Hapus';} if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED') toast(e.message,'error'); }
}

function fval(id){ const el=$(id); return el?el.value.trim():''; }
async function jamaahHargaPreview(){
  const idGroup=$('f_group')?$('f_group').value:'';
  const tipeKamar=$('f_tipe')?$('f_tipe').value:'Quad';
  const kategori=$('f_kategori')?$('f_kategori').value:'Dewasa';
  // Paket otomatis mengikuti kloter terpilih.
  const grp=(cache.groups||[]).find(g=>g.idGroup===idGroup);
  const pk=grp&&grp.idPaket?(cache.paket||[]).find(p=>p.idPaket===grp.idPaket):null;
  if($('f_paket')) $('f_paket').value=pk?pk.namaPaket:'';
  const el=$('f_hargaInfo'); if(!el) return;
  if(!idGroup){ el.style.display='none'; return; }
  try{
    const r=await api('group.harga',{idGroup,tipeKamar,kategori});
    if(r&&r.harga>0){
      el.style.display='block';
      el.textContent='Harga per jamaah ('+(kategori==='Infant'?'Infant':tipeKamar)+'): '+rupiah(r.harga);
    } else { el.style.display='none'; }
  }catch(e){ el.style.display='none'; }
}
async function submitJamaah(id){
  const p={
    namaLengkap:fval('f_nama'), nik:fval('f_nik'), noPaspor:fval('f_paspor'),
    tglLahir:fval('f_lahir'), jenisKelamin:fval('f_jk'), alamat:fval('f_alamat'),
    noHp:fval('f_hp'), email:fval('f_email'),
    kontakDarurat:fval('f_kd'), hpDarurat:fval('f_hpd'), hubunganDarurat:fval('f_hub'),
    kondisiKesehatan:fval('f_sehat'), statusVaksin:fval('f_vaksin'),
    paket:fval('f_paket'), idGroup:fval('f_group'), tipeKamar:fval('f_tipe')||'Quad',
    kategoriJamaah:fval('f_kategori')||'Dewasa',
    sumberLead:fval('f_sumber'), catatan:fval('f_catatan'),
    // ── Field SISKOPATUH ──
    tempatLahir:fval('f_tmpLahir'), namaAyah:fval('f_namaAyah'),
    statusPerkawinan:fval('f_kawin'), pekerjaan:fval('f_kerja'), pendidikan:fval('f_didik'),
    kewarganegaraan:fval('f_kwn')||'WNI', provinsi:fval('f_prov'), kabupaten:fval('f_kab'),
    kecamatan:fval('f_kec'), kelurahan:fval('f_kel'), kodePos:fval('f_pos'),
    golonganDarah:fval('f_goldar'), tempatTerbitPaspor:fval('f_tmpPaspor'),
    embarkasi:fval('f_embarkasi'), namaMahram:fval('f_mahram'), hubunganMahram:fval('f_mahramHub'),
    // ── Keluarga / Rombongan ──
    idKeluarga:fval('f_keluarga'), hubunganKeluarga:fval('f_hubKeluarga'),
    isPIC:$('f_pic')?$('f_pic').checked:false
  };
  // validation
  document.querySelectorAll('#jForm .field').forEach(f=>f.classList.remove('err'));
  let err='';
  if(!p.namaLengkap){ err='Nama lengkap wajib diisi.'; $('f_nama').closest('.field').classList.add('err'); }
  else if(!/^\d{16}$/.test(p.nik)){ err='NIK harus 16 digit angka.'; $('f_nik').closest('.field').classList.add('err'); }
  else if(!p.noHp){ err='No HP wajib diisi.'; $('f_hp').closest('.field').classList.add('err'); }
  else if(!p.idGroup){ err='Kloter wajib dipilih.'; $('f_group').closest('.field').classList.add('err'); }
  if(err){ toast(err,'error'); return; }
  const b=$('jSubmit'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    if(id){ p.idJamaah=id; await api('jamaah.update',p); toast('Data jamaah diperbarui.'); }
    else { await api('jamaah.create',p); toast('Jamaah baru ditambahkan.'); }
    closeModal();
    cache.jamaah=null;                 // invalidate cache untuk view lain
    try{ await getJamaah(true); buildFamilyIndex(); }catch(e){}
    if(!id) jamaahState.page=1;        // jamaah baru tampil di halaman pertama
    if($('jTableWrap')) await loadJamaahPage();
  }catch(e){ if(b){b.disabled=false;b.textContent=id?'Simpan Perubahan':'Tambah Jamaah';}
    if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

function addRombonganRow(){

  div.innerHTML='<input class="inp" id="rb_nama_'+i+'" placeholder="Nama lengkap">'

function removeRombonganRow(i){ const el=$('rbm_'+i); if(el) el.remove(); }
async function submitRombongan(){
  const paket=fval('rb_paket'), idGroup=fval('rb_group'), tipe=fval('rb_tipe')||'Quad';
  if(!paket){ toast('Paket wajib dipilih.','error'); return; }
  const rows=document.querySelectorAll('#rbRows .rb-member');
  const picVal=(document.querySelector('input[name=rbPic]:checked')||{}).value;
  const members=[];
  let err='';
  rows.forEach(r=>{
    const i=r.id.replace('rbm_','');
    const nama=fval('rb_nama_'+i), nik=fval('rb_nik_'+i), hp=fval('rb_hp_'+i);
    if(!nama&&!nik&&!hp) return; // baris kosong dilewati
    if(!nama){ err='Setiap anggota wajib punya nama.'; return; }
    if(!/^\d{16}$/.test(nik)){ err='NIK '+nama+' harus 16 digit angka.'; return; }
    if(!hp){ err='No HP '+nama+' wajib diisi.'; return; }
    members.push({ namaLengkap:nama, nik:nik, noHp:hp, jenisKelamin:fval('rb_jk_'+i),
      hubunganKeluarga:fval('rb_hub_'+i), paket:paket, idGroup:idGroup, tipeKamar:tipe,
      isPIC:String(i)===String(picVal) });
  });
  if(err){ toast(err,'error'); return; }
  if(!members.length){ toast('Isi minimal satu anggota.','error'); return; }
  const b=$('rbSubmit'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    const r=await api('keluarga.tambah',{members});
    closeModal(); toast('Rombongan ditambahkan ('+(r.count||members.length)+' anggota).');
    cache.jamaah=null; jamaahState.page=1;
    try{ await getJamaah(true); buildFamilyIndex(); }catch(e){}
    if($('jTableWrap')) await loadJamaahPage();
  }catch(e){ if(b){b.disabled=false;b.textContent='Simpan Rombongan';}
    if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

function renderKloterPage(c){
  const BELUM=['Draft','Aktif','Aktif','Fullseat','Penuh'];
  const groups=cache.groups||[];
  const tabs=[
    {id:'belum',label:'Belum Berangkat',ic:'🛫',filter:g=>['Draft','Aktif','Fullseat','Penuh'].includes(g.statusGroup)},
    {id:'jalan',label:'Sedang Berjalan',ic:'✈️', filter:g=>g.statusGroup==='Berjalan'},
    {id:'selesai',label:'Selesai',       ic:'🏁',filter:g=>g.statusGroup==='Selesai'}
  ];
  const tabCounts={};
  tabs.forEach(t=>{ tabCounts[t.id]=groups.filter(t.filter).length; });
  // Tab bar
  let h='<div style="display:flex;gap:4px;margin-bottom:18px;border-bottom:1.5px solid var(--border);padding-bottom:0">';
  tabs.forEach(t=>{
    const active=kloterActiveTab===t.id;
    const cnt=tabCounts[t.id]||0;
    h+='<button onclick="kloterTabFilter(\''+t.id+'\')" style="background:none;border:none;padding:9px 16px;font-size:13px;font-weight:'+(active?'700':'500')+';color:'+(active?'var(--k)':'var(--text-sub)')+';cursor:pointer;border-bottom:'+(active?'2.5px solid var(--k)':'2.5px solid transparent')+';margin-bottom:-1.5px">'+t.ic+' '+t.label+(cnt?' <span style="background:'+(active?'var(--k)':'var(--gray-bg)')+';color:'+(active?'#fff':'var(--text-sub)')+';border-radius:99px;padding:1px 7px;font-size:11px;margin-left:4px">'+cnt+'</span>':'')+'</button>';
  });
  h+='</div>';

  const tab=tabs.find(t=>t.id===kloterActiveTab)||tabs[0];
  const filtered=groups.filter(tab.filter);

  if(!groups.length){
    h+=emptyState('🛫','Belum ada kloter','Klik "+ Tambah Kloter" untuk membuat kloter keberangkatan pertama.');
    c.innerHTML=h; return;
  }
  if(!filtered.length){
    const emptyMsg={belum:'Tidak ada kloter yang sedang dibuka pendaftaran.',jalan:'Tidak ada kloter yang sedang dalam perjalanan.',selesai:'Belum ada kloter yang selesai.'};
    h+=emptyState(tab.ic,'Tidak ada data',emptyMsg[tab.id]||'');
    c.innerHTML=h; return;

  h+='<div class="grid cards-grid">';

    fPergi+=' → JED';
    const noPergi=g.noFlightPergi1?(esc(g.noFlightPergi1)+(g.noFlightPergi2?' / '+esc(g.noFlightPergi2):'')):'—';
    let fPulang='JED';
    if(g.kotaTransitPulang) fPulang+=' → '+esc(g.kotaTransitPulang);
    fPulang+=' → '+(esc(g.asal)||'CGK');
    const noPulang=g.noFlightPulang1?(esc(g.noFlightPulang1)+(g.noFlightPulang2?' / '+esc(g.noFlightPulang2):'')):'—';
    h+='<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">'
      +'<div class="card-title" style="margin-bottom:0">'+icon('plane')+esc(g.namaGroup)+'</div>'+badgeStatus(g.statusGroup)+'</div>'
      +'<div class="sm muted" style="margin-bottom:11px">'+fmtDate(g.tglBerangkat)+' → '+fmtDate(g.tglPulang)+'</div>'
      +'<div style="background:var(--gray-bg);border-radius:8px;padding:9px 11px;margin-bottom:10px;font-size:12px">'

let _kloterPaketMap={};
async function loadKloterPaketOptions(selId){
  try{
    const list=unwrapList(await api('paket.list',{includeNonaktif:true}));
    _kloterPaketMap={}; (list||[]).forEach(p=>{ _kloterPaketMap[p.idPaket]=p; });
    const sel=$('g_paket'); if(!sel) return;
    sel.innerHTML='<option value="">— Pilih paket —</option>'+(list||[]).map(p=>'<option value="'+esc(p.idPaket)+'"'+(selId===p.idPaket?' selected':'')+'>'+esc(p.namaPaket)+' — '+rupiah(p.harga||0)+(p.aktif?'':' (nonaktif)')+'</option>').join('');
    kloterUpdateHarga();
  }catch(e){}
}
async function loadPembimbingOptions(){
  try{
    const list=unwrapList(await api('petugas.list'));

function kloterUpdateHarga(){
  const pk=_kloterPaketMap[$('g_paket')?$('g_paket').value:'']||{};
  const hq=parseFloat(pk.harga)||0;
  const ht=parseFloat(pk.tambahanTriple)||0;
  const hd=parseFloat(pk.tambahanDouble)||0;
  const el=$('g_hargaPreview'); if(!el) return;
  if(!hq){ el.innerHTML='<span class="muted sm">Pilih paket untuk melihat harga.</span>'; return; }
  el.innerHTML='<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--indigo-tx)">Quad</div><div style="font-size:15px;font-weight:800;color:var(--k)">'+rupiah(hq)+'</div></div>'
    +(ht?'<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#166534">Triple</div><div style="font-size:15px;font-weight:800;color:#16a34a">'+rupiah(hq+ht)+'</div></div>':'')

async function submitKloter(id){
  const p={
    idGroup: id||'', namaGroup:fval('g_nama'), statusGroup:fval('g_status'),
    pembimbing:fval('g_pembimbing'), kapasitas:fval('g_kapasitas'),
    tglBerangkat:fval('g_tglb'), tglPulang:fval('g_tglp'),
    maskapai:fval('g_maskapai'), asal:fval('g_asal')||'CGK',
    noFlightPergi1:fval('g_fp1'), noFlightPergi2:fval('g_fp2'),
    kotaTransitPergi: $('g_trP')&&$('g_trP').checked?fval('g_trPkota'):'',
    noFlightPulang1:fval('g_pp1'), noFlightPulang2:fval('g_pp2'),
    kotaTransitPulang: $('g_trR')&&$('g_trR').checked?fval('g_trRkota'):'',
    hotelMadinah:fval('g_hmad'), hotelMakkah:fval('g_hmak'), hotelTransit:fval('g_htrans'),
    idPaket:fval('g_paket')
  };
  if(!p.namaGroup){ toast('Nama kloter wajib diisi.','error'); return; }
  if(!p.tglBerangkat){ toast('Tanggal berangkat wajib diisi.','error'); return; }
  if(!p.noFlightPergi1){ toast('No penerbangan pergi wajib diisi.','error'); return; }
  if(!p.idPaket){ toast('Pilih paket dulu (sumber harga kloter).','error'); return; }
  const b=$('gSubmit'); b.disabled=true; b.textContent='Menyimpan…';
  try{
    const res=await api('group.save',p);
    closeModal(); toast('Kloter '+(id?'diperbarui':'dibuat')+'.');
    if(res&&res.warning) toast('⚠️ '+res.warning,'error');
    await getGroups(true); renderKloterPage($('content'));
  }catch(e){ if(b){b.disabled=false;b.textContent=id?'Simpan Perubahan':'Buat Kloter';}
    if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

function renderDokPanel(dok){

  const id=dok.idJamaah;
  function v(k){ return esc(dok[k]!=null?dok[k]:''); }
  const BERKAS_FIELDS=[
    {key:'pasFoto',    label:'Pas Foto 4x6 (background putih)'},
    {key:'fotoKTP',    label:'Foto KTP'},
    {key:'fotoPaspor', label:'Foto Paspor'},
    {key:'fotoVisa',   label:'Foto Visa'}
  ];
  const VAKSIN_FIELDS=[
    {key:'kartuKuning',      label:'Kartu Kuning / ICV Meningitis'},
    {key:'vaksinMeningitis', label:'Sertifikat Vaksin Meningitis'},
    {key:'vaksinCovid',      label:'Vaksin Covid-19'}

  function lbl(t){ return '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-sub);letter-spacing:.05em;margin:12px 0 6px">'+t+'</div>'; }
  function renderFotoRow(f){
    const url=dok[f.key]||'';
    return '<div class="foto-row"><span class="foto-lbl">'+esc(f.label)+'</span>'
      +(url?'<a href="'+esc(url)+'" target="_blank" class="foto-link" title="'+esc(url)+'">Lihat ↗</a>':'<span class="sm muted">—</span>')
      +'<label class="btn sm" style="cursor:pointer"><input type="file" class="foto-upload-input" accept="image/*,.pdf" onchange="uploadFoto(\''+esc(id)+'\',\''+f.key+'\',this)">'+icon('plus',13)+'Upload</label>'
      +'</div>';
  }
  let h='<div class="card"><div class="card-title">'+icon('doc')+''+esc(dok.namaJamaah||'Dokumen')+'</div>';
  h+='<div class="dp-field" style="margin-bottom:6px"><div class="k">Status Kelengkapan</div><div class="v">'+badgeDok(dok.statusDokumenLengkap)+'</div></div>';
  // Data paspor & visa (untuk SISKOPATUH) — bisa diedit
  h+=lbl('Data Paspor & Visa <span style="font-weight:400;text-transform:none;color:#0f766e">— untuk SISKOPATUH</span>');
  h+=field('No KTP (NIK)',false,'<input id="dk_ktp" maxlength="16" value="'+v('noKTP')+'">')
    +field('No Paspor',false,'<input id="dk_paspor" value="'+v('noPaspor')+'">')
    +field('Tgl Terbit Paspor',false,'<input type="date" id="dk_pt" value="'+v('tglTerbitPaspor')+'">')
    +field('Tgl Berlaku Paspor',false,'<input type="date" id="dk_pe" value="'+v('tglExpiredPaspor')+'">','','Wajib SISKOPATUH — min. berlaku 6 bln sebelum berangkat')
    +field('No Visa',false,'<input id="dk_visa" value="'+v('noVisa')+'">')
    +field('Tgl Berlaku Visa',false,'<input type="date" id="dk_ve" value="'+v('tglExpiredVisa')+'">');
  h+='<button class="btn primary sm" style="margin:8px 0 4px" onclick="saveDokumen(\''+esc(id)+'\')">'+icon('check',13)+' Simpan Data Dokumen</button>';
  // Berkas / foto
  h+=lbl('Berkas / Foto');
  BERKAS_FIELDS.forEach(f=>{ h+=renderFotoRow(f); });
  h+=lbl('Vaksinasi <span style="font-weight:400;text-transform:none;font-size:11px;color:#d97706">opsional — sesuai kebijakan terkini</span>');
  VAKSIN_FIELDS.forEach(f=>{ h+=renderFotoRow(f); });
  h+='</div>';
  return h;
}
async function saveDokumen(id){
  const p={ idJamaah:id,
    noKTP:fval('dk_ktp'), noPaspor:fval('dk_paspor'),
    tglTerbitPaspor:fval('dk_pt'), tglExpiredPaspor:fval('dk_pe'),
    noVisa:fval('dk_visa'), tglExpiredVisa:fval('dk_ve') };
  try{
    await api('dokumen.save',p);
    toast('Data dokumen disimpan.');
    await getJamaah(true);
    renderDokumen($('content'),cache.jamaah); // auto re-select jamaah yang sama
  }catch(e){ if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
async function selectDokumen(idJamaah){
  dokSelected=idJamaah;
  // optimistic: re-render table dengan selection
  document.querySelectorAll('#content table.tbl tbody tr').forEach(tr=>tr.classList.remove('sel'));
  const row=document.querySelector('#content table.tbl tbody tr[onclick*="'+idJamaah+'"]');
  if(row) row.classList.add('sel');
  const panel=$('dokPanel');
  if(panel) panel.innerHTML='<div class="card" style="min-height:100px"><div class="spinner" style="margin:20px auto"></div></div>';
  try{
    const dok=await api('dokumen.get',{idJamaah});
    if(panel) panel.innerHTML=renderDokPanel(dok||{idJamaah,namaJamaah:(cache.jamaah||[]).find(j=>j.idJamaah===idJamaah)?.namaLengkap||idJamaah});
  }catch(e){ if(panel) panel.innerHTML=renderDokPanel(null); }
}
async function uploadFoto(idJamaah, jenisFile, input){
  const file=input.files[0]; if(!file) return;
  // size check: max 5MB
  if(file.size>5*1024*1024){ toast('File terlalu besar (maks 5MB).','error'); input.value=''; return; }
  const label=input.closest('.foto-row');
  const origBtn=label?label.querySelector('label'):null;
  if(origBtn){ origBtn.style.opacity='.5'; origBtn.style.pointerEvents='none'; }
  toast('Mengupload '+file.name+'…');
  try{
    const base64=await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });
    const r=await api('dokumen.uploadFoto',{idJamaah,jenisFile,base64,mimeType:file.type,fileName:file.name});
    toast('Upload berhasil! File tersimpan di Drive.');
    // refresh panel
    await selectDokumen(idJamaah);
  }catch(e){
    if(origBtn){ origBtn.style.opacity=''; origBtn.style.pointerEvents=''; }
    if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast('Upload gagal: '+e.message,'error');
  }
  input.value='';
}

function famColor(id){
  if(!id) return '';
  let h=0; for(let i=0;i<id.length;i++){ h=((h<<5)-h)+id.charCodeAt(i); h|=0; }
  return 'hsl('+(Math.abs(h)%360)+',65%,52%)';
}

async function roomlistLoad(idGroup){
  roomlistState.idGroup=idGroup; roomlistState.pendingChanges=false;
  if(!idGroup){ $('rlBody').innerHTML=emptyState('🏨','Pilih kloter',''); $('rlActions').innerHTML=''; return; }
  $('rlBody').innerHTML='<div class="spinner"></div>';
  $('rlActions').innerHTML='';
  try{
    const d=await api('roomlist.list',{idGroup});
    // Petugas kloter ini juga bisa ditempatkan di kamar (disimpan di kolom IDJamaah,
    // dibedakan lewat daftar petugas — tanpa mengubah skema Roomlist).
    let petugas=[];
    try{ petugas=unwrapList(await api('petugas.list',{idGroup})); }catch(_){}
    roomlistState.petugas=petugas;
    const petMap={}; petugas.forEach(p=>{ petMap[p.idPetugas]=p; });
    roomlistState.petMap=petMap;
    roomlistState.data=d;
    roomlistState.assignments={};
    (d.rows||[]).forEach(r=>{
      const key=r.lokasi+'|||'+r.nomorKamar+'|||'+r.tipeKamar+'|||'+r.hotel;
      if(!roomlistState.assignments[key]) roomlistState.assignments[key]={ kamar:r.nomorKamar, tipe:r.tipeKamar, hotel:r.hotel, lokasi:r.lokasi, occupants:[], placeholderIdRoom:'' };
      if(!r.idJamaah){ roomlistState.assignments[key].placeholderIdRoom=r.idRoom; return; } // kamar kosong (template)
      const pet=petMap[r.idJamaah];
      if(pet){
        roomlistState.assignments[key].occupants.push({ idJamaah:r.idJamaah, namaJamaah:r.namaJamaah, idRoom:r.idRoom, jenisKelamin:pet.jenisKelamin||'', idKeluarga:'', isPetugas:true, peran:pet.peran||'' });
      } else {
        const j=(cache.jamaah||[]).find(x=>x.idJamaah===r.idJamaah)||{};
        roomlistState.assignments[key].occupants.push({ idJamaah:r.idJamaah, namaJamaah:r.namaJamaah, idRoom:r.idRoom, jenisKelamin:j.jenisKelamin||'', idKeluarga:j.idKeluarga||'' });
      }
    });
    renderRoomlistDD();
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') $('rlBody').innerHTML=emptyState('⚠️','Gagal memuat',e.message); }
}

function renderRoomlistDD(){
  const idGroup=roomlistState.idGroup;

  Object.values(assignments).forEach(rm=>{ if(rm.lokasi===lok) rm.occupants.forEach(o=>assignedIds.add(o.idJamaah)); });
  const unassigned=kloterJamaah.filter(j=>!assignedIds.has(j.idJamaah));

    unassigned.forEach(j=>{

          h+='<div class="jamaah-chip" draggable="true" data-id="'+esc(o.idJamaah)+'" data-jk="'+esc(jj.jenisKelamin||'')+'" data-klg="'+esc(jj.idKeluarga||'')+'" data-nama="'+esc((o.namaJamaah||'').replace(/"/g,'&quot;'))+'" data-from="'+esc(key)+'" ondragstart="rlDragStart(event)" ondragend="rlDragEnd(event)">'
            +dot2+'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;font-size:12px">'+esc(o.namaJamaah)+'</span>'
            +'<button class="btn sm danger" style="padding:2px 5px;font-size:11px;margin-left:4px" onclick="rlRemoveOccupant(\''+esc(key.replace(/'/g,'\\\''))+'\',\''+esc(o.idJamaah)+'\')">&#10005;</button></div>';
        });
      }
      h+='</div></div>';
    });
  }
  h+='</div></div>';
  $('rlBody').innerHTML=h;
}

function rlSetLokasi(lok){ roomlistState.lokasi=lok; renderRoomlistDD(); }

function rlDragStart(e){
  const el=e.currentTarget;
  _rlDragId=el.dataset.id;
  const payload=JSON.stringify({idJamaah:el.dataset.id, namaJamaah:el.dataset.nama, jenisKelamin:el.dataset.jk, idKeluarga:el.dataset.klg, fromKey:el.dataset.from||'', isPetugas:el.dataset.pet==='1', peran:el.dataset.peran||''});
  e.dataTransfer.setData('text/plain', payload);
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>el.classList.add('dragging'),0);
}
function rlDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.room-drop').forEach(z=>z.classList.remove('drag-over','drag-warn'));
  _rlDragId=null;
}
function rlDragOver(e){
  e.preventDefault();
  const zone=e.currentTarget;
  const key=zone.dataset.key;
  const rm=roomlistState.assignments[key];
  if(!rm){ zone.classList.add('drag-over'); return; }
  try{
    const d=JSON.parse(e.dataTransfer.getData('text/plain')||'{}');
    const existGender=rm.occupants.length?rm.occupants[0].jenisKelamin:'';
    if(existGender && d.jenisKelamin && existGender!==d.jenisKelamin){
      zone.classList.add('drag-warn'); zone.classList.remove('drag-over'); return;
    }
  }catch(err){}
  zone.classList.add('drag-over'); zone.classList.remove('drag-warn');
}
function rlDragLeave(e){ e.currentTarget.classList.remove('drag-over','drag-warn'); }
function rlDrop(e){
  e.preventDefault();
  const zone=e.currentTarget; zone.classList.remove('drag-over','drag-warn');
  const key=zone.dataset.key;
  try{
    const d=JSON.parse(e.dataTransfer.getData('text/plain')||'{}');
    if(!d.idJamaah) return;
    rlAssignToRoom(d, key);
  }catch(err){ toast('Drag & drop gagal.','error'); }
}
function rlAssignToRoom(d, toKey){
  const fromKey=d.fromKey||'';
  const idJamaah=d.idJamaah;
  if(fromKey && roomlistState.assignments[fromKey]){
    roomlistState.assignments[fromKey].occupants=roomlistState.assignments[fromKey].occupants.filter(o=>o.idJamaah!==idJamaah);
  }
  const rm=roomlistState.assignments[toKey];
  if(!rm) return;
  if(rm.occupants.find(o=>o.idJamaah===idJamaah)) return;
  if(d.isPetugas){
    rm.occupants.push({ idJamaah, namaJamaah:d.namaJamaah||'', jenisKelamin:d.jenisKelamin||'', idKeluarga:'', isPetugas:true, peran:d.peran||'' });
  } else {
    const j=(cache.jamaah||[]).find(x=>x.idJamaah===idJamaah)||{};
    rm.occupants.push({ idJamaah, namaJamaah:d.namaJamaah||j.namaLengkap||'', jenisKelamin:d.jenisKelamin||j.jenisKelamin||'', idKeluarga:d.idKeluarga||j.idKeluarga||'' });
  }
  roomlistState.pendingChanges=true;
  renderRoomlistDD();
}
function rlRemoveOccupant(key, idJamaah){
  const rm=roomlistState.assignments[key];
  if(!rm) return;
  rm.occupants=rm.occupants.filter(o=>o.idJamaah!==idJamaah);
  roomlistState.pendingChanges=true;
  renderRoomlistDD();
}
function deleteRoomCard(key){
  if(!confirm('Hapus kamar ini beserta semua penghuninya?')) return;
  const rm=roomlistState.assignments[key];
  if(rm){
    rm.occupants.forEach(async o=>{ if(o.idRoom){ try{ await api('roomlist.delete',{idRoom:o.idRoom}); }catch(ex){} } });
    if(rm.placeholderIdRoom){ api('roomlist.delete',{idRoom:rm.placeholderIdRoom}).catch(()=>{}); }
  }
  delete roomlistState.assignments[key];
  roomlistState.pendingChanges=true;
  renderRoomlistDD();
}
async function saveRoomlistBatch(){
  const idGroup=roomlistState.idGroup;
  if(!idGroup){ toast('Pilih kloter dulu.','error'); return; }
  const btn=$('rlSaveBtn'); if(btn){ btn.disabled=true; btn.textContent='Menyimpan…'; }
  const assignments=[];
  const keptIds=new Set();
  Object.values(roomlistState.assignments).forEach(rm=>{
    if(rm.occupants.length){
      rm.occupants.forEach(o=>{
        if(o.idRoom) keptIds.add(o.idRoom);
        assignments.push({ idGroup, idJamaah:o.idJamaah, namaJamaah:o.namaJamaah, hotel:rm.hotel||'', lokasi:rm.lokasi, nomorKamar:rm.kamar, tipeKamar:rm.tipe, idRoom:o.idRoom||'' });
      });
    } else {
      // kamar kosong (template hasil salin) → simpan sebagai baris placeholder agar tidak hilang
      if(rm.placeholderIdRoom) keptIds.add(rm.placeholderIdRoom);
      assignments.push({ idGroup, idJamaah:'', namaJamaah:'', hotel:rm.hotel||'', lokasi:rm.lokasi, nomorKamar:rm.kamar, tipeKamar:rm.tipe, idRoom:rm.placeholderIdRoom||'' });
    }
  });
  // Baris lama yang penghuninya sudah dikeluarkan/dipindah → hapus agar tidak muncul lagi.
  const orphans=((roomlistState.data&&roomlistState.data.rows)||[])
    .map(r=>r.idRoom).filter(id=>id && !keptIds.has(id));
  try{
    for(const idRoom of orphans){ try{ await api('roomlist.delete',{idRoom}); }catch(ex){} }
    const r=await api('roomlist.saveBatch',{assignments,idGroup});
    toast('Roomlist disimpan ('+(r.count||0)+' penempatan).');
    roomlistState.pendingChanges=false;
    await roomlistLoad(idGroup);
  }catch(e){ if(btn){btn.disabled=false;btn.textContent='&#128190; Simpan';}
    if(e.message!=='LISENSI'&&e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

function openSalinRoomlist(){

  const others=(cache.groups||[]).filter(g=>g.idGroup!==cur);

    +'<div class="form-grid">'

    {size:'sm',persistent:true});
}
async function salinRoomlistDari(srcGroup){
  if(!srcGroup){ toast('Pilih kloter sumber.','error'); return; }
  const b=$('srBtn'); if(b){ b.disabled=true; b.textContent='Menyalin…'; }
  try{
    const d=await api('roomlist.list',{idGroup:srcGroup});
    const seen={}; let added=0;
    (d.rows||[]).forEach(r=>{
      const key=r.lokasi+'|||'+r.nomorKamar+'|||'+r.tipeKamar+'|||'+r.hotel;
      if(seen[key]) return; seen[key]=1;
      if(roomlistState.assignments[key]) return; // sudah ada di kloter tujuan
      roomlistState.assignments[key]={ kamar:r.nomorKamar, tipe:r.tipeKamar, hotel:r.hotel, lokasi:r.lokasi, occupants:[] };
      added++;
    });
    closeModal();
    if(!added){ toast('Tidak ada kamar baru untuk disalin (mungkin sudah ada).'); return; }
    roomlistState.pendingChanges=true;
    renderRoomlistDD();
    toast(added+' kamar disalin. Isi jamaah lalu klik Simpan.');
  }catch(e){ if(b){b.disabled=false;b.textContent='Salin Struktur';}
    if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

async function autoAssignRooms(){

function siskoKpi(n,l,cls){
  const col=cls==='green'?'var(--green,#16a34a)':cls==='amber'?'var(--amber,#d97706)':'var(--text,inherit)';
  return '<div class="card kpi"><div class="kpi-lbl">'+esc(l)+'</div><div class="kpi-val" style="color:'+col+'">'+n+'</div></div>';
}
async function siskoUnduh(onlyComplete){
  try{
    const r=await api('siskopatuh.exportCsv',{idGroup:siskoState.idGroup, onlyComplete});
    if(!r||!r.csv){ toast('Tidak ada data untuk diekspor.','error'); return; }
    const blob=new Blob([r.csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=r.filename||'siskopatuh.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('✅ '+r.count+' jamaah diekspor'+(r.skipped?(' · '+r.skipped+' dilewati'):'')+'.');
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
async function siskoUnduhXlsx(){
  try{
    toast('Menyiapkan file Excel…');
    const r=await api('siskopatuh.exportXlsx',{idGroup:siskoState.idGroup, onlyComplete:false});
    if(!r||!r.base64){ toast('Tidak ada data untuk diekspor.','error'); return; }
    const bin=atob(r.base64); const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:r.mimeType||'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=r.filename||'siskopatuh.xlsx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('✅ Excel siap ('+r.count+' jamaah'+(r.skipped?(', '+r.skipped+' belum lengkap'):'')+').');
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}
async function siskoCetak(){
  try{
    const r=await api('siskopatuh.exportHtml',{idGroup:siskoState.idGroup});
    if(r&&r.html){ const w=window.open('','_blank'); if(w){ w.document.write(r.html); w.document.close(); } else toast('Popup diblokir browser.','error'); }
    else toast('Tidak ada data untuk dicetak.','error');
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') toast(e.message,'error'); }
}

let bayarState={ search:'', status:'', page:1, perPage:20, total:0, pages:1, rows:[], searchTimer:null, view:'invoice', keluarga:null };
LOADERS.pembayaran=async function(c){
  setTopActions('<button class="btn primary" onclick="openPelunasan()">'+icon('money',15)+'Generate Pelunasan</button>');
  c.innerHTML='<div class="stat-pills">'+Array(5).fill('<div class="stat-pill"><div class="skel" style="width:60%"></div><div class="skel" style="width:80%;height:20px;margin-top:8px"></div></div>').join('')+'</div>'+skelTable(7,6);
  try{
    await getJamaah(); buildFamilyIndex();
    const lap=await api('laporan',{});
    bayarState.page=1;
    renderPembayaranShell(c,lap);
    if(bayarState.view==='keluarga') renderKeluargaView(); else await loadBayarPage();
  }catch(e){ if(e.message!=='SESSION_EXPIRED'&&e.message!=='AKSES_DITOLAK') c.innerHTML=emptyState('⚠️','Gagal memuat pembayaran',e.message); }
};
function renderPembayaranShell(c,lap){
  const st=bayarState;
  let h='<div class="stat-pills">'
    +statPill('Total Tagihan',rupiah(lap.totalTagihan))
    +statPill('Diterima',rupiah(lap.totalLunas))
    +statPill('Outstanding',rupiah(lap.totalOutstanding!=null?lap.totalOutstanding:(lap.totalPending+lap.totalJatuhTempo)))
    +statPill('Jatuh Tempo',(lap.overdueCount||0)+' tagihan · '+rupiah(lap.totalJatuhTempo))
    +statPill('Diterima Bln Ini',rupiah(lap.bulanIniDiterima||0))
    +'</div>';
  // Tab toggle
  h+='<div class="seg" style="display:inline-flex;gap:4px;background:var(--k-surface);padding:4px;border-radius:10px;margin-bottom:12px">'
    +'<button class="btn sm'+(st.view==='invoice'?' primary':'')+'" onclick="switchBayarView(\'invoice\')">Per Invoice</button>'
    +'<button class="btn sm'+(st.view==='keluarga'?' primary':'')+'" onclick="switchBayarView(\'keluarga\')">Per Keluarga</button>'
    +'</div>';
  h+='<div id="bayarInvoiceView"'+(st.view==='keluarga'?' style="display:none"':'')+'><div class="card"><div class="filterbar">'
    +'<div class="search-wrap">'+icon('search',16)+'<input class="inp" id="bSearch" placeholder="Cari nama / no. invoice…" value="'+esc(st.search)+'" oninput="bayarSearchInput()"></div>'
    +'<select class="inp" id="bStatus" onchange="bayarFilterChange()">'
    +['','Pending','Lunas','Jatuh Tempo'].map(s=>'<option value="'+s+'"'+(st.status===s?' selected':'')+'>'+(s||'Semua Status')+'</option>').join('')+'</select>'
    +'</div><div id="bayarTableWrap"><div class="spinner"></div></div></div></div>';
  h+='<div id="bayarKeluargaView"'+(st.view==='invoice'?' style="display:none"':'')+'><div class="spinner"></div></div>';
  c.innerHTML=h;
}
function switchBayarView(v){
  bayarState.view=v;
  const iv=$('bayarInvoiceView'), kv=$('bayarKeluargaView');
  document.querySelectorAll('.seg .btn').forEach(b=>b.classList.remove('primary'));
  if(iv) iv.style.display=(v==='invoice'?'':'none');
  if(kv) kv.style.display=(v==='keluarga'?'':'none');
  // refresh tombol aktif
  const segBtns=document.querySelectorAll('.seg .btn');
  if(segBtns[0]&&v==='invoice') segBtns[0].classList.add('primary');
  if(segBtns[1]&&v==='keluarga') segBtns[1].classList.add('primary');
  if(v==='keluarga') renderKeluargaView(); else if(!bayarState.rows.length) loadBayarPage();
}

        +(a.hubunganKeluarga?' <span class="muted">('+esc(a.hubunganKeluarga)+')</span>':'')+'</div>').join('');

        +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span class="fam-dot" style="background:'+famColor(k.idKeluarga)+'"></span>'
        +'<b>'+esc(k.picNama||'(PIC belum ditentukan)')+'</b><span class="badge gray" style="font-size:9px">'+(k.anggota?k.anggota.length:0)+' pax</span></div>'
        +anggotaH
        +'<div style="margin-top:8px;border-top:1px solid var(--border-soft);padding-top:8px;font-size:12px">'
        +'<div style="display:flex;justify-content:space-between"><span class="muted">Tagihan</span><b>'+rupiah(k.totalTagihan)+'</b></div>'
        +'<div style="display:flex;justify-content:space-between"><span class="muted">Lunas</span><b style="color:#16a34a">'+rupiah(k.totalLunas)+'</b></div>'
        +'<div style="display:flex;justify-content:space-between"><span class="muted">Sisa</span><b style="color:'+(k.totalPending>0?'#dc2626':'#16a34a')+'">'+rupiah(k.totalPending)+'</b></div>'
        +'</div>';
